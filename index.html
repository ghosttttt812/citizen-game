<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五院大亂鬥 - citizengame0602</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <!-- Firebase SDKs (Compat version for easier browser script usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide Icons Mapping
        const { 
            Swords: LucideSwords, 
            Zap: LucideZap, 
            Crosshair: LucideCrosshair, 
            Skull: LucideSkull, 
            Users: LucideUsers, 
            LogOut: LucideLogOut, 
            Play: LucidePlay, 
            AlertCircle: LucideAlertCircle 
        } = window.lucide;

        // --- Firebase 初始化 ---
        const firebaseConfig = {
          apiKey: "AIzaSyCIuwZeqeIaqg0Mrp2XjCf7b98lNwS_bhY",
          authDomain: "citizengame0602.firebaseapp.com",
          projectId: "citizengame0602",
          storageBucket: "citizengame0602.firebasestorage.app",
          messagingSenderId: "1016120027651",
          appId: "1:1016120027651:web:70fd0aa0a1a79eaae6bc36",
          measurementId: "G-FZLKK4YZ43"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'citizengame0602';

        // --- 遊戲資料庫 ---
        const INITIAL_HP = 100;

        const YUAN_DB = [
          { id: 'executive', name: '行政院', color: 'bg-blue-500', text: 'text-blue-500' },
          { id: 'legislative', name: '立法院', color: 'bg-emerald-500', text: 'text-emerald-500' },
          { id: 'judicial', name: '司法院', color: 'bg-amber-500', text: 'text-amber-500' },
          { id: 'examination', name: '考試院', color: 'bg-purple-500', text: 'text-purple-500' },
          { id: 'control', name: '監察院', color: 'bg-rose-500', text: 'text-rose-500' }
        ];

        const CARD_POOL = [
          { id: 'c1', name: '【SSR】覆議卡', desc: '指定攻擊：扣除目標 25 HP', type: 'target', dmg: 25, heal: 0, rarity: 'text-yellow-400' },
          { id: 'c2', name: '【SSR】倒閣卡', desc: '吸血攻擊：吸取目標 15 HP', type: 'target', dmg: 15, heal: 15, rarity: 'text-yellow-400' },
          { id: 'c3', name: '【SR】違憲審查', desc: '範圍攻擊：其餘所有人扣 10 HP', type: 'aoe', dmg: 10, heal: 0, rarity: 'text-purple-400' },
          { id: 'c4', name: '【SR】彈劾糾舉', desc: '制裁霸主：全場血量最高者扣 20 HP', type: 'auto-highest', dmg: 20, heal: 0, rarity: 'text-purple-400' },
          { id: 'c5', name: '【R】國家考試', desc: '自我庇護：自身回復 25 HP', type: 'self', dmg: 0, heal: 25, rarity: 'text-blue-400' }
        ];

        const QUESTION_BANK = [
          { text: '提出「不信任案（倒閣）」是哪一個機關專屬的職權？', options: ['行政院', '立法院', '監察院'], answer: 1 },
          { text: '總統發布緊急命令後，必須在幾天內提交哪個機關追認？', options: ['立法院 (10天內)', '司法院 (15天內)', '行政院 (7天內)'], answer: 0 },
          { text: '小明亂丟垃圾被環保局開罰單。這屬於哪一種法律責任？', options: ['刑事責任', '民事責任', '行政責任'], answer: 2 },
          { text: '人民權利受行政機關違法侵害時，應提起何種訴訟救濟？', options: ['民事訴訟', '行政訴訟', '刑事訴訟'], answer: 1 },
          { text: '立院三讀通過法案，行政院覺得難以執行，下一步合法反擊是？', options: ['宣告法案無效', '移請立法院覆議', '解散立法院'], answer: 1 },
          { text: '警方無搜索票強行進入民宅開展搜查，屋主可主張警方侵犯了什麼權利？', options: ['財產權', '隱私權', '平等權'], answer: 1 },
          { text: '法官判決肇事者需賠償家屬100萬。這體現了何種法律功能？', options: ['威嚇犯罪', '解決紛爭，填補損害', '維護行政程序'], answer: 1 },
          { text: '新聞：「某官員涉嫌貪污，遭檢方起訴。」這體現了什麼？', options: ['司法機關獨立追究刑事責任', '行政權對立法權的制衡', '監察權的彈劾功能'], answer: 0 },
          { text: '為防範官員貪污，我國憲法設計哪兩個機關進行事後調查與懲處？', options: ['監察院調查，司法院審理', '立法院調查，行政院審理', '考試院調查，監察院審理'], answer: 0 },
          { text: '若要制定保障「表意自由」的校規，下列何者最合理且不矛盾？', options: ['學生可任意發言，不受任何校規限制', '可組社團，但需登記且不得違反公序良俗', '只有成績優異者才有權利發表意見'], answer: 1 },
          { text: '「班會多數決同意把某同學趕出教室。」這違背了什麼民主原則？', options: ['權力分立', '多數決不能侵犯少數基本權利', '誠實信用原則'], answer: 1 },
          { text: '學校規定「成績不到80分禁止參加社團」。此規定最大的瑕疵是？', options: ['違反權力分立', '違反隱私權', '違反平等原則與比例原則'], answer: 2 }
        ];

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        function App() {
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [roomCode, setRoomCode] = useState('');
          const [roomData, setRoomData] = useState(null);
          const [myRole, setMyRole] = useState(null); 
          const [joinInput, setJoinInput] = useState('');
          const [errorMsg, setErrorMsg] = useState('');

          const showError = (msg) => setErrorMsg(msg);

          useEffect(() => {
            const initAuth = async () => {
              try {
                await auth.signInAnonymously();
              } catch (error) {
                console.error("Auth error:", error);
                showError("連線至伺服器失敗，請檢查 Firebase 匿名登入是否開啟。");
              } finally {
                setIsConnecting(false);
              }
            };
            initAuth();
            const unsubscribe = auth.onAuthStateChanged(setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !roomCode) return;
            const roomRef = db.collection('rooms').doc(roomCode);
            const unsubscribe = roomRef.onSnapshot((docSnap) => {
              if (docSnap.exists) {
                setRoomData(docSnap.data());
              } else {
                showError("房間不存在或已由房主關閉！");
                setRoomCode('');
                setMyRole(null);
              }
            }, (error) => {
              console.error("Snapshot error:", error);
              showError("資料同步中斷：" + error.message);
            });
            return () => unsubscribe();
          }, [user, roomCode]);

          const createRoom = async () => {
            if (!user) { showError("尚未登入，請稍候！"); return; }
            try {
              const code = Math.random().toString(36).substring(2, 6).toUpperCase();
              const roomRef = db.collection('rooms').doc(code);
              const initialData = {
                state: 'lobby', hostUid: user.uid,
                teams: {
                  group1: { id: 'group1', name: '第 1 組', joined: false, yuan: null },
                  group2: { id: 'group2', name: '第 2 組', joined: false, yuan: null },
                  group3: { id: 'group3', name: '第 3 組', joined: false, yuan: null },
                  group4: { id: 'group4', name: '第 4 組', joined: false, yuan: null },
                  group5: { id: 'group5', name: '第 5 組', joined: false, yuan: null }
                },
                hp: { group1: INITIAL_HP, group2: INITIAL_HP, group3: INITIAL_HP, group4: INITIAL_HP, group5: INITIAL_HP },
                questions: shuffle(QUESTION_BANK),
                qIndex: 0, buzzerWinner: null, drawnCard: null,
                actionLog: ['🎯 遊戲房間已建立，等待各組加入...']
              };
              await roomRef.set(initialData);
              setRoomCode(code);
              setMyRole('host');
            } catch (e) {
              showError("建立失敗：" + e.message);
            }
          };

          const joinRoom = async () => {
            if (!user) { showError("連線中..."); return; }
            if (!joinInput || joinInput.length !== 4) { showError("請輸入 4 碼代碼"); return; }
            try {
              const code = joinInput.toUpperCase();
              const roomRef = db.collection('rooms').doc(code);
              const snap = await roomRef.get();
              if (snap.exists) setRoomCode(code);
              else showError(`找不到房間「${code}」`);
            } catch (e) {
              showError("加入失敗：" + e.message);
            }
          };

          const selectGroup = async (groupId) => {
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              await roomRef.update({
                [`teams.${groupId}.joined`]: true,
                [`teams.${groupId}.uid`]: user.uid
              });
              setMyRole(groupId);
            } catch (e) {
              showError("選擇組別失敗：" + e.message);
            }
          };

          const startGame = async () => {
            if (myRole !== 'host' || !roomData) return;
            try {
              const shuffledYuans = shuffle(YUAN_DB);
              const roomRef = db.collection('rooms').doc(roomCode);
              const updates = { 
                state: 'playing', 
                actionLog: ['🎲 遊戲開始，隨機分配身分！', ...roomData.actionLog].slice(0, 5) 
              };
              Object.keys(roomData.teams).forEach((id, idx) => {
                updates[`teams.${id}.yuan`] = shuffledYuans[idx];
              });
              await roomRef.update(updates);
            } catch (e) {
              showError("開始遊戲失敗：" + e.message);
            }
          };

          const handleBuzz = async () => {
            if (!myRole.startsWith('group') || roomData.state !== 'playing' || roomData.buzzerWinner) return;
            if (roomData.hp[myRole] <= 0) return; 
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              await roomRef.update({ buzzerWinner: myRole });
            } catch (e) {}
          };

          const handleAnswer = async (optionIdx) => {
            if (myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              const currentQ = roomData.questions[roomData.qIndex];
              const myTeam = roomData.teams[myRole];
              if (optionIdx === currentQ.answer) {
                const card = shuffle(CARD_POOL)[0];
                await roomRef.update({
                  state: 'gacha', drawnCard: card,
                  actionLog: [`✨ ${myTeam.yuan.name} 答對了！抽出了 ${card.name}！`, ...roomData.actionLog].slice(0, 5)
                });
                if (card.type !== 'target') setTimeout(() => executeCardSkill(card, null), 2000);
              } else {
                await roomRef.update({
                  [`hp.${myRole}`]: Math.max(0, roomData.hp[myRole] - 15),
                  actionLog: [`❌ ${myTeam.yuan.name} 答錯了！受傷 -15 HP`, ...roomData.actionLog].slice(0, 5),
                  buzzerWinner: null 
                });
                setTimeout(() => nextQuestion(), 2000);
              }
            } catch (e) {
              showError("作答失敗：" + e.message);
            }
          };

          const executeCardSkill = async (card, targetId) => {
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              const attacker = roomData.teams[roomData.buzzerWinner];
              let newHp = { ...roomData.hp };
              let logMsg = '';
              switch(card.type) {
                case 'target':
                  newHp[targetId] = Math.max(0, newHp[targetId] - card.dmg);
                  if(card.heal > 0) newHp[roomData.buzzerWinner] = Math.min(150, newHp[roomData.buzzerWinner] + card.heal);
                  logMsg = `💥 攻擊了 ${roomData.teams[targetId].yuan.name}`;
                  break;
                case 'aoe':
                  Object.keys(newHp).forEach(key => {
                    if (key !== roomData.buzzerWinner) newHp[key] = Math.max(0, newHp[key] - card.dmg);
                  });
                  logMsg = `🌋 全場範圍攻擊！`;
                  break;
                case 'auto-highest':
                  let highest = null; let maxVal = -1;
                  Object.keys(newHp).forEach(key => {
                    if (newHp[key] > maxVal && key !== roomData.buzzerWinner) { maxVal = newHp[key]; highest = key; }
                  });
                  if(highest) {
                    newHp[highest] = Math.max(0, newHp[highest] - card.dmg);
                    logMsg = `👁️ 制裁霸主 ${roomData.teams[highest].yuan.name}`;
                  }
                  break;
                case 'self':
                  newHp[roomData.buzzerWinner] = Math.min(150, newHp[roomData.buzzerWinner] + card.heal);
                  logMsg = `🛡️ 獲得治癒！`;
                  break;
              }
              await roomRef.update({ hp: newHp, actionLog: [logMsg, ...roomData.actionLog].slice(0, 5) });
              setTimeout(() => nextQuestion(), 3000);
            } catch (e) {}
          };

          const nextQuestion = async () => {
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              if (roomData.qIndex + 1 < roomData.questions.length) {
                await roomRef.update({ qIndex: roomData.qIndex + 1, buzzerWinner: null, drawnCard: null, state: 'playing' });
              } else {
                await roomRef.update({ state: 'end' });
              }
            } catch (e) {}
          };

          const resetGame = async () => {
            try {
              const roomRef = db.collection('rooms').doc(roomCode);
              await roomRef.update({
                state: 'lobby',
                hp: { group1: INITIAL_HP, group2: INITIAL_HP, group3: INITIAL_HP, group4: INITIAL_HP, group5: INITIAL_HP },
                questions: shuffle(QUESTION_BANK),
                qIndex: 0, buzzerWinner: null, drawnCard: null,
                actionLog: ['🔄 遊戲已重置']
              });
            } catch (e) {}
          };

          const ErrorModal = () => {
            if (!errorMsg) return null;
            return (
              <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-slate-800 border-4 border-rose-500 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                  <LucideAlertCircle className="text-rose-500 w-16 h-16 mx-auto mb-4 animate-bounce" />
                  <h3 className="text-2xl font-black text-white mb-3">系統提示</h3>
                  <p className="text-slate-300 font-medium mb-8 whitespace-pre-wrap">{errorMsg}</p>
                  <button onClick={() => setErrorMsg('')} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-black text-lg py-4 rounded-xl transition active:scale-95">我知道了</button>
                </div>
              </div>
            );
          };

          if (isConnecting) return <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-4"><LucideZap className="text-yellow-400 w-16 h-16 animate-pulse mb-4" /><h2 className="text-2xl font-bold">系統連線中...</h2><ErrorModal /></div>;

          if (!roomCode) {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6">
                <ErrorModal />
                <LucideSwords className="text-yellow-400 w-24 h-24 mb-6 animate-pulse" />
                <div className="text-center mb-10">
                    <h1 className="text-4xl md:text-5xl font-black text-white leading-tight">五院大亂鬥<br/><span className="text-2xl text-amber-500">連線對戰版</span></h1>
                    <div className="text-slate-500 text-xs mt-2 font-mono">Build: 2026-05-16-1630 (Polished UI)</div>
                </div>
                <div className="flex flex-col md:flex-row gap-6 w-full max-w-3xl">
                  <div className="flex-1 bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 flex flex-col items-center shadow-xl">
                    <LucidePlay className="text-emerald-400 w-12 h-12 mb-4" />
                    <h2 className="text-2xl font-bold text-white mb-2">老師 / 房主</h2>
                    <button onClick={createRoom} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-xl py-4 rounded-xl transition active:scale-95 shadow-lg mt-4">建立新房間</button>
                  </div>
                  <div className="flex-1 bg-slate-800 p-8 rounded-3xl border-2 border-slate-700 flex flex-col items-center shadow-xl">
                    <LucideUsers className="text-blue-400 w-12 h-12 mb-4" />
                    <h2 className="text-2xl font-bold text-white mb-2">學生 / 玩家</h2>
                    <input type="text" value={joinInput} onChange={(e)=>setJoinInput(e.target.value.toUpperCase())} maxLength={4} placeholder="4 碼代碼" className="w-full bg-slate-900 text-white text-center text-2xl font-black py-4 rounded-xl border-2 border-slate-600 focus:border-blue-500 outline-none mb-4 uppercase transition-all mt-4" />
                    <button onClick={joinRoom} className="w-full bg-blue-500 hover:bg-blue-600 text-white font-black text-xl py-4 rounded-xl transition active:scale-95 shadow-lg">加入遊戲</button>
                  </div>
                </div>
              </div>
            );
          }

          if (!roomData) return <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center font-bold text-2xl animate-pulse text-center p-10">正在讀取房間資料...<br/>(請確認資料庫規則已發佈)</div>;

          if (roomData.state === 'lobby') {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 relative">
                <ErrorModal />
                <button onClick={()=>setRoomCode('')} className="absolute top-6 right-6 text-slate-400 hover:text-white flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full transition"><LucideLogOut size={18}/> 離開</button>
                <div className="bg-slate-800 p-6 md:p-12 rounded-3xl border-4 border-yellow-500 shadow-2xl text-center max-w-2xl w-full">
                  <h2 className="text-2xl text-slate-400 font-bold mb-3">房間代碼：</h2>
                  <h1 className="text-7xl md:text-9xl font-black text-white tracking-widest mb-10 drop-shadow-lg">{roomCode}</h1>
                  {myRole === 'host' ? (
                    <div className="animate-fade-in">
                      <p className="text-yellow-400 mb-6 font-bold text-lg">各組連線狀態</p>
                      <div className="flex flex-wrap justify-center gap-4 mb-10">
                        {Object.values(roomData.teams).map(t => (
                          <span key={t.id} className={`px-5 py-3 rounded-full font-black text-sm border-2 ${t.joined ? 'bg-emerald-500 border-emerald-400 text-white' : 'bg-slate-800 border-slate-600 text-slate-500'}`}>
                            {t.name} {t.joined ? '✓' : '...'}
                          </span>
                        ))}
                      </div>
                      <button onClick={startGame} className="w-full md:w-auto bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 text-slate-900 text-2xl font-black py-4 px-16 rounded-full shadow-xl transition active:scale-95">開始遊戲</button>
                    </div>
                  ) : (
                    <div className="animate-fade-in">
                      {!myRole ? (
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                          {Object.values(roomData.teams).map(t => (
                            <button key={t.id} onClick={() => selectGroup(t.id)} disabled={t.joined} className={`py-5 rounded-2xl font-black text-xl transition-all ${t.joined ? 'bg-slate-700 text-slate-500 opacity-50' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-lg active:translate-y-1'}`}>{t.name}</button>
                          ))}
                        </div>
                      ) : (
                        <div className="py-10 text-3xl font-black text-emerald-400 animate-pulse flex items-center justify-center gap-3"><LucideZap /> 成功加入 {roomData.teams[myRole].name}！</div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          }

          const currentQ = roomData.questions[roomData.qIndex];
          const isHost = myRole === 'host';
          const myTeam = isHost ? null : roomData.teams[myRole];
          const myYuanColor = myTeam?.yuan?.color || 'bg-slate-800';

          return (
            <div className="min-h-screen bg-slate-900 flex flex-col font-sans overflow-hidden">
              <ErrorModal />
              <header className="bg-slate-800 text-white p-4 shadow-lg flex justify-between items-center border-b border-slate-700 z-20">
                <div className="flex items-center gap-3">
                  <span className="font-bold text-slate-400">房 {roomCode}</span>
                  <span className={`px-4 py-1.5 rounded-full font-black text-sm tracking-widest ${isHost ? 'bg-slate-600' : myYuanColor}`}>
                    {isHost ? '主控台' : `${myTeam.name} (${myTeam.yuan?.name})`}
                  </span>
                </div>
                <div className="text-sm font-bold bg-slate-700 px-4 py-1.5 rounded-full border border-slate-600">題：{roomData.qIndex + 1} / {roomData.questions.length}</div>
              </header>

              <main className="flex-1 relative flex flex-col lg:flex-row p-4 gap-4 z-10 overflow-hidden">
                <div className="lg:w-1/3 grid grid-cols-5 lg:grid-cols-2 gap-2 content-start overflow-x-auto lg:overflow-visible">
                  {Object.values(roomData.teams).map((team) => {
                    const hpVal = roomData.hp[team.id];
                    const isBuzzed = roomData.buzzerWinner === team.id;
                    return (
                      <div key={team.id} className={`relative p-3 rounded-2xl border-4 transition-all flex-shrink-0 w-32 md:w-auto lg:w-full ${isBuzzed ? 'border-yellow-400 bg-white scale-[1.02] z-10' : 'border-slate-800 bg-slate-800'} ${hpVal <= 0 ? 'opacity-40 grayscale' : ''}`}>
                        <div className="absolute top-0 left-0 w-full h-full rounded-lg overflow-hidden opacity-20"><div className={`h-full ${team.yuan?.color}`} style={{ width: `${Math.min(100, (hpVal/150)*100)}%` }}></div></div>
                        <div className="relative z-10 flex flex-col items-center">
                          <div className={`text-[10px] font-bold ${isBuzzed ? 'text-slate-500' : 'text-slate-400'}`}>{team.name}</div>
                          <h3 className={`font-black text-sm md:text-xl ${isBuzzed ? team.yuan?.text : 'text-white'}`}>{team.yuan?.name}</h3>
                          <div className={`text-2xl font-black ${isBuzzed ? 'text-slate-900' : 'text-white'}`}>{hpVal} {hpVal <= 0 && <LucideSkull className="inline text-rose-500" size={16}/>}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="lg:w-2/3 flex flex-col gap-4 h-full relative">
                  {roomData.state !== 'end' ? (
                    <div className={`flex-1 bg-slate-800 rounded-3xl p-6 shadow-2xl transition-all border-4 flex flex-col justify-center ${roomData.buzzerWinner ? 'border-yellow-400' : 'border-slate-700'} ${(roomData.state === 'gacha' || (roomData.state === 'targeting' && !isHost)) ? 'opacity-30 blur-sm pointer-events-none' : ''}`}>
                      <h2 className="text-2xl md:text-4xl font-black text-white leading-tight mb-8">{currentQ.text}</h2>
                      <div className="space-y-4">
                        {currentQ.options.map((opt, idx) => (
                          <button key={idx} onClick={() => handleAnswer(idx)} disabled={myRole !== roomData.buzzerWinner} className={`w-full text-left p-5 rounded-2xl border-2 text-xl font-bold transition-all ${myRole === roomData.buzzerWinner ? 'bg-slate-100 border-white text-slate-900 hover:bg-white active:scale-95' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>
                            <span className="inline-block w-8 h-8 rounded-full bg-black/10 text-center leading-8 mr-4 text-sm font-black">{['A','B','C'][idx]}</span>{opt}
                          </button>
                        ))}
                      </div>
                      {!isHost && roomData.state === 'playing' && !roomData.buzzerWinner && (
                        <button onClick={handleBuzz} disabled={roomData.hp[myRole] <= 0} className={`mt-8 w-full py-10 rounded-3xl font-black text-4xl text-white shadow-xl active:translate-y-2 transition-all ${roomData.hp[myRole] <= 0 ? 'bg-slate-600' : myYuanColor}`}>搶答 PUSH!</button>
                      )}
                    </div>
                  ) : (
                    <div className="flex-1 bg-slate-800 rounded-3xl p-8 flex flex-col items-center justify-center border-4 border-yellow-500 text-center shadow-2xl animate-fade-in">
                      <div className="text-7xl mb-6">👑</div>
                      <h2 className="text-3xl text-yellow-400 font-bold mb-4">國家霸主誕生</h2>
                      <div className="bg-slate-900/50 p-6 rounded-2xl w-full max-w-md">
                        {Object.values(roomData.teams).sort((a,b) => roomData.hp[b.id] - roomData.hp[a.id]).map((t, idx) => (
                          <div key={t.id} className="flex justify-between items-center mb-2 font-black">
                            <span>{idx+1}. <span className={t.yuan?.text}>{t.yuan?.name}</span></span>
                            <span className={roomData.hp[t.id] > 0 ? 'text-yellow-400' : 'text-rose-500'}>{roomData.hp[t.id]} HP</span>
                          </div>
                        ))}
                      </div>
                      {isHost && <button onClick={resetGame} className="mt-8 bg-white text-slate-900 text-xl font-black py-4 px-12 rounded-full shadow-xl active:scale-95 transition">再戰一局</button>}
                    </div>
                  )}

                  <div className="h-32 bg-black/60 border-2 border-slate-700 rounded-2xl p-4 overflow-hidden flex flex-col font-mono shadow-inner">
                    <div className="text-emerald-400 font-bold mb-2 flex items-center border-b border-slate-700 pb-1 text-sm"><LucideZap size={16} className="mr-2"/> 鬥爭日誌</div>
                    <div className="flex-1 flex flex-col-reverse overflow-hidden">
                      {roomData.actionLog.map((log, i) => <div key={i} className={`text-sm py-0.5 ${i === 0 ? 'text-white font-bold animate-fade-in' : 'text-slate-500'}`}>{log}</div>)}
                    </div>
                  </div>

                  {(roomData.state === 'gacha' || roomData.state === 'targeting') && (
                    <div className="absolute inset-0 z-50 flex items-center justify-center p-4">
                      <div className="bg-slate-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-md w-full shadow-2xl text-center animate-fade-in">
                        <h2 className={`text-4xl font-black mb-6 ${roomData.drawnCard.rarity}`}>{roomData.drawnCard.name}</h2>
                        <div className="bg-slate-800 p-5 rounded-xl mb-8"><p className="text-xl text-white font-bold leading-relaxed">{roomData.drawnCard.desc}</p></div>
                        {roomData.state === 'targeting' ? (
                          myRole === roomData.buzzerWinner ? (
                            <div className="grid grid-cols-2 gap-3">
                              {Object.values(roomData.teams).filter(t => t.id !== myRole && roomData.hp[t.id] > 0).map(t => (
                                <button key={t.id} onClick={() => executeCardSkill(roomData.drawnCard, t.id)} className={`py-4 rounded-xl font-black text-white ${t.yuan?.color} hover:opacity-90 active:scale-95 transition`}>{t.yuan?.name}</button>
                              ))}
                            </div>
                          ) : <div className="text-rose-500 font-black text-2xl animate-pulse">⚠️ 對手正在瞄準！</div>
                        ) : <div className="text-yellow-400 font-black text-2xl animate-pulse text-center">⚡ 技能發動中...</div>}
                      </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => window.lucide.createIcons(), 1000);
    </script>
</body>
</html>
