                      <div>
                        <p className="app-text-2 text-sm mb-5">開局隨機抽得一張，部分效果可讓你再抽。靈活使用改變局勢！</p>
                        <div className="space-y-3">
                          {RULES_COMMON_CARDS.map((c, i) => (
                            <div key={c.id} className="app-card app-border rounded-2xl p-4 animate-fade-in border"
                              style={{ animationDelay:`${i*50}ms` }}>
                              <div className="flex gap-3 items-start">
                                <span className="text-2xl shrink-0 leading-none mt-0.5">{c.emoji}</span>
                                <div className="flex-1">
                                  <div className="flex items-center gap-2 flex-wrap mb-1.5">
                                    <h3 className="text-base font-black app-text">【{c.name}】</h3>
                                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${c.tagColor}`}>{c.tag}</span>
                                  </div>
                                  <p className="app-text-2 text-sm leading-relaxed">{c.desc}</p>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                  </div>
                </div>
              </div>
            );
          }

          // ── 畫面分支 ──────────────────────────────────────────

          if (isConnecting) return <div className="h-full flex items-center justify-center font-bold app-overlay">連線中...</div>;

          if (!roomCode) return (
            <div className="h-full flex flex-col items-center justify-center p-6 space-y-6 app-overlay">
              <ErrorModal />
              <h1 className="text-4xl font-black">五院大亂鬥</h1>
              <p className="app-text-3 font-mono text-[10px]">Build: {BUILD}</p>
              <div className="w-full max-w-sm app-card p-6 rounded-3xl border-2 app-border shadow-xl space-y-4">
                <button onClick={createRoom} className="w-full text-white py-6 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition" style={{ backgroundColor:'#75809C' }}>建立房間（老師）</button>
                <div className="h-px app-card-2"></div>
                <input value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())} maxLength={4} placeholder="輸入 4 碼代碼" className="w-full app-card-2 p-5 rounded-2xl text-center text-2xl font-bold border-2 app-border focus:border-blue-500 outline-none" />
                <button onClick={joinRoom} disabled={joinInput.length !== 4} className="w-full bg-blue-500 text-white disabled:bg-stone-300 disabled:text-stone-500 py-6 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">加入遊戲（學生）</button>
              </div>
              <button onClick={() => { setShowRules(true); setRulesTab(0); }}
                className="app-text-3 text-sm font-bold underline underline-offset-4 active:opacity-70">
                📖 遊戲說明 / 技能卡效果
              </button>
            </div>
          );

          if (!roomData) return <div className="h-full flex items-center justify-center animate-pulse text-xl app-overlay">載入資料中...</div>;

          if (syncCountdown !== null && syncCountdown > 0) return (
            <div className="h-full app-overlay flex flex-col items-center justify-center p-10">
              <h2 className="text-2xl font-bold mb-10 app-accent-text">準備開始...</h2>
              <h1 className="text-[12rem] font-black animate-countdown app-text">{syncCountdown}</h1>
              <p className="mt-10 text-xl font-bold app-text-2">正在同步所有玩家網路速度</p>
            </div>
          );

          if (roomData.state === 'lobby') return (
            <div className="h-full flex flex-col items-center justify-center p-6 app-overlay relative">
              <ErrorModal />
              <button onClick={leaveRoom} className="absolute top-6 right-6 app-text-3 app-card px-4 py-2 rounded-full text-sm font-bold active:scale-95 transition">離開</button>
              <button onClick={() => { setShowRules(true); setRulesTab(0); }} className="absolute top-6 left-6 app-text-3 app-card px-3 py-2 rounded-full text-xs font-bold active:scale-95 transition">📖 規則</button>
              <div className="app-card p-8 rounded-3xl border-4 text-center shadow-2xl w-full max-w-sm sm:max-w-md" style={{ borderColor:'#75809C' }}>
                <h2 className="app-text-3 text-lg font-bold">房間代碼：</h2>
                <h1 className="text-6xl font-black tracking-widest my-6 select-all">{roomCode}</h1>
                {myRole === 'host' ? (
                  <div>
                    <div className="flex flex-wrap justify-center gap-2 mb-6">
                      {Object.values(roomData.teams).map(t => {
                        const hb = roomData.heartbeats?.[t.id] || 0;
                        const offline = t.joined && hb > 0 && (Date.now() - hb) > 60000;
                        return (
                          <span key={t.id} className={`px-3 py-1.5 rounded-full font-bold text-xs border-2
                            ${offline ? 'bg-rose-100 border-rose-400 text-rose-700'
                              : t.joined ? `${t.yuan?.color} border-transparent text-white`
                              : 'app-card-2 app-border app-text-3'}`}>
                            {t.yuan?.name} {offline ? '⚠ 斷線' : t.joined ? '✓ 已連線' : '等待中'}
                          </span>
                        );
                      })}
                    </div>
                    <button onClick={startSync} className="w-full text-white py-4 rounded-full font-black text-xl active:scale-95 transition" style={{ backgroundColor:'#75809C' }}>同步啟動</button>
                  </div>
                ) : !myRole ? (
                  <div>
                  <p className="app-text font-bold text-lg mb-4">請選擇你的陣營</p>
                  <div className="grid grid-cols-2 gap-3">
                    {Object.values(roomData.teams).map(t => (
                      <button key={t.id} onClick={() => handleGroupSelect(t)} disabled={t.joined}
                        className={`p-4 rounded-xl font-black text-sm transition text-white
                          ${t.joined ? 'app-card-2 app-text-3 opacity-50' : `${t.yuan?.color} active:scale-95`}`}>
                        {t.yuan?.name}
                      </button>
                    ))}
                  </div>
                  </div>
                ) : (
                  <div className="text-emerald-400 text-xl font-black animate-pulse">連線成功！等待老師啟動</div>
                )}
              </div>

              {/* ── 選院確認 Modal ── */}
              {pendingGroup && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-auto animate-fade-in" style={{ background:'rgba(60,50,35,0.55)' }}>
                  <div className="app-card-3 rounded-3xl border-4 app-accent-border p-6 max-w-xs w-full space-y-4 app-shadow">
                    <div className="text-center">
                      <p className="app-text-3 text-sm">你選擇了</p>
                      <h2 className={`text-2xl font-black ${pendingGroup.team.yuan?.text}`}>{pendingGroup.team.yuan?.name}</h2>
                    </div>

                    {/* 院專屬技能卡 */}
                    <div className="rounded-2xl p-4 border-2 app-accent-border" style={{ background:'rgba(212,180,131,0.18)' }}>
                      <p className="text-[10px] app-accent-text font-bold mb-1">⭐ 院專屬技能卡（開局持有）</p>
                      <p className={`text-base font-black mb-2 ${pendingGroup.team.yuan?.text}`}>
                        【{pendingGroup.excCard?.name}】
                      </p>
                      <p className="text-xs app-text-2 leading-relaxed">{pendingGroup.excCard?.desc}</p>
                    </div>

                    {/* 共同卡抽取 */}
                    {!cardRevealed ? (
                      <button onClick={() => { sound.draw(); setCardRevealed(true); }}
                        className="w-full bg-purple-500 text-white py-4 rounded-2xl font-black text-base active:scale-95 transition animate-pulse">
                        🎴 抽取共同技能卡
                      </button>
                    ) : (
                      <div className="rounded-2xl p-4 border-2 border-purple-400 animate-fade-in" style={{ background:'rgba(168,128,200,0.14)' }}>
                        <p className="text-[10px] text-purple-700 font-bold mb-1">🎴 隨機共同技能卡</p>
                        <p className="text-base font-black app-text mb-2">
                          【{pendingGroup.comCard?.name}】
                        </p>
                        <p className="text-xs app-text-2 leading-relaxed">{pendingGroup.comCard?.desc}</p>
                      </div>
                    )}

                    {cardRevealed && (
                      <button onClick={() => { selectGroup(pendingGroup.gid); setPendingGroup(null); setCardRevealed(false); }}
                        className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl active:scale-95 transition">
                        ✅ 確認加入！
                      </button>
                    )}
                    {!cardRevealed && (
                      <button onClick={() => { setPendingGroup(null); setCardRevealed(false); }}
                        className="w-full app-text-3 text-sm py-2 active:opacity-70">
                        ← 返回重選
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );

          if (roomData.state === 'end') return (
            <div className="h-full flex flex-col items-center justify-center p-6 app-overlay animate-fade-in">
              <ErrorModal />
              <div className="app-card p-8 rounded-3xl border-4 border-yellow-500 text-center shadow-2xl w-full max-w-sm">
                <div className="text-6xl mb-4">👑</div>
                <h2 className="text-3xl font-black app-accent-text mb-6">戰鬥結束！</h2>
                <div className="space-y-2 mb-8 text-left">
                  {Object.values(roomData.teams)
                    .sort((a, b) => (roomData.scores?.[b.id] ?? 0) - (roomData.scores?.[a.id] ?? 0))
                    .map((t, idx) => (
                      <div key={t.id} className="flex justify-between items-center app-card-2 px-4 py-3 rounded-xl">
                        <span className="font-black flex items-center gap-2">
                          <span className="app-text-3 text-sm w-4">{idx + 1}.</span>
                          <span className={t.yuan?.text}>{t.yuan?.name}</span>
                          <span className="app-text-3 text-xs">{t.name}</span>
                        </span>
                        <span className={`font-black ${(roomData.scores?.[t.id] ?? 0) > 0 ? 'app-accent-text' : 'text-rose-500'}`}>{roomData.scores?.[t.id] ?? 0} 分</span>
                      </div>
                    ))}
                </div>
                {myRole === 'host' ? (
                  <button onClick={resetGame} className="w-full bg-white text-black py-4 rounded-full font-black text-lg active:scale-95 transition">重置房間，再戰一局</button>
                ) : (
                  <p className="app-text-3 font-bold animate-pulse">等待老師重置遊戲...</p>
                )}
              </div>
            </div>
          );

          // ── 突發事件全員作答畫面 ──────────────────────────────
          if (roomData.state === 'surprise' && roomData.surpriseEvent) {
            const ev = roomData.surpriseEvent;
            const myAnswer = ev.answers?.[myRole];
            const hasPendingSurpriseAnswer = localAnswerResult?.scope === 'surprise';
            const hasAnswered = (myAnswer !== undefined || hasPendingSurpriseAnswer) && myRole !== 'host';
            const yuanInfo = YUAN_DB.find(y => y.name === ev.yuan);
            const joinedIds = Object.values(roomData.teams).filter(t => t.joined).map(t => t.id);
            const answeredCount = Object.keys(ev.answers || {}).length;
            const resolved = !!ev.resolved;
            return (
              <div className="h-full flex flex-col overflow-hidden" style={{ background:'rgba(252,232,232,0.96)' }}>
                <ErrorModal />
                {feedbackOverlay && (
                  <div className={`fixed inset-0 z-[95] pointer-events-none flex items-center justify-center ${feedbackOverlay.type === 'correct' ? 'fb-bg-correct' : 'fb-bg-wrong'}`}>
                    <div className={feedbackOverlay.type === 'correct' ? 'fb-pop-correct' : 'fb-pop-wrong'}>
                      <div className="text-center">
                        <div className="text-9xl mb-2">{feedbackOverlay.type === 'correct' ? '🎉' : '❌'}</div>
                        <p className={`text-3xl font-black ${feedbackOverlay.yuanText || ''}`}>{feedbackOverlay.yuan}</p>
                        <p className={`text-5xl font-black mt-2 ${feedbackOverlay.type === 'correct' ? 'text-emerald-700' : 'text-rose-700'}`}>{feedbackOverlay.points > 0 ? '+' : ''}{feedbackOverlay.points} 分</p>
                      </div>
                    </div>
                  </div>
                )}

                {/* Banner */}
                <div className="surprise-banner shrink-0 bg-rose-600 text-white text-center py-4 px-3 shadow-md">
                  <h1 className="text-2xl sm:text-3xl font-black">{resolved ? '🎯 結算' : '🚨 突發事件！要來選院長囉！'}</h1>
                  <p className="text-xs sm:text-sm opacity-90 mt-1">全員作答 · 答對 +{SURPRISE_POINTS} 分 · 答錯 -{WRONG_PENALTY} 分</p>
                </div>

                <main className="flex-1 flex flex-col p-4 gap-3 overflow-auto" style={{ WebkitOverflowScrolling:'touch' }}>
                  {/* 題目（含圖片）— variant === 'yuan' 時不顯示院別標題（會洩題） */}
                  <div className="app-card-3 rounded-2xl p-5 border-2 border-rose-300 text-center app-shadow">
                    {ev.variant === 'yuan'
                      ? <p className="text-xs font-black mb-2 app-accent-text">看照片猜院別</p>
                      : <p className={`text-xs font-black mb-2 ${yuanInfo?.text || 'app-accent-text'}`}>關於 {ev.yuan}</p>}
                    {/* 圖片：載入失敗自動 fallback 到 emoji（避免黑 box） */}
                    {ev.img ? (
                      <img src={encodeURI(ev.img)} alt={ev.yuan}
                        className="rounded-2xl mx-auto mb-3 max-h-56 object-contain border app-border bg-white shadow-md"
                        onError={(e) => {
                          const el = e.currentTarget;
                          if (!el.dataset.fellback) {
                            el.dataset.fellback = '1';
                            el.style.display = 'none';
                            const next = el.nextSibling;
                            if (next) next.style.display = 'block';
                          }
                        }} />
                    ) : null}
                    <div className="text-7xl mb-3" style={{ display: ev.img ? 'none' : 'block' }}>{ev.emoji || '🏛️'}</div>
                    <h2 className="text-xl sm:text-2xl font-black app-text leading-relaxed">{ev.text}</h2>
                  </div>

                  {/* 倒數 / 結算狀態 */}
                  <div className="flex items-center justify-between px-2">
                    <span className="text-xs app-text-2">{resolved ? '結算中…' : `已作答 ${answeredCount} / ${joinedIds.length}`}</span>
                    {!resolved && surpriseTimeLeft !== null && (
                      <span className={`text-2xl font-black ${surpriseTimeLeft <= 5 ? 'text-rose-700 animate-pulse' : 'app-text'}`}>⏱ {surpriseTimeLeft}s</span>
                    )}
                  </div>

                  {/* 結算後：顯示全員結果列表 */}
                  {resolved ? (
                    <div className="grid grid-cols-1 gap-2">
                      <p className="text-center text-sm font-bold app-text-2 mb-1">正解：<span className="app-accent-text">{ev.options[ev.answer]}</span></p>
                      {(ev.results || []).map((r) => (
                        <div key={r.yuanId} className={`flex items-center justify-between px-4 py-3 rounded-xl border-2
                          ${r.resultType === 'correct' ? 'bg-emerald-50 border-emerald-300'
                            : r.resultType === 'wrong' ? 'bg-rose-50 border-rose-300'
                            : 'app-card-2 app-border'}`}>
                          <span className={`font-black ${r.yuanText || 'app-text'}`}>{r.yuan}</span>
                          <span className={`font-black text-sm ${r.resultType === 'correct' ? 'text-emerald-700' : r.resultType === 'wrong' ? 'text-rose-700' : 'app-text-3'}`}>
                            {r.resultType === 'correct' ? `✅ +${SURPRISE_POINTS}`
                              : r.resultType === 'wrong' ? `❌ -${WRONG_PENALTY}`
                              : '— 未作答'}
                          </span>
                        </div>
                      ))}
                      <p className="text-center text-xs app-text-3 mt-2">3 秒後繼續下一題…</p>
                    </div>
                  ) : myRole === 'host' ? (
                    <div className="app-card-2 rounded-2xl p-6 text-center">
                      <p className="app-text-2 font-bold">老師端：等待學生作答</p>
                      <p className="app-text-3 text-xs mt-2">作答完畢或時間到後自動結算</p>
                      <div className="mt-4 grid grid-cols-1 gap-2">
                        {ev.options.map((o, i) => (
                          <div key={i} className="p-3 rounded-xl border-2 text-left app-card-3 app-border app-text">
                            <span className="inline-block w-7 h-7 rounded-full text-center leading-7 mr-3 text-sm font-black" style={{ background:'rgba(255,255,255,0.25)' }}>{['A','B','C','D'][i]}</span>
                            {o}
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 gap-2.5">
                      {ev.options.map((o, i) => {
                        const isLocalPicked = localAnswerResult?.scope === 'surprise' && localAnswerResult.idx === i;
                        const picked = myAnswer === i || isLocalPicked;
                        const pickedCorrect = isLocalPicked && localAnswerResult.isCorrect === true;
                        const pickedWrong   = isLocalPicked && localAnswerResult.isCorrect === false;
                        return (
                          <button key={i} onClick={() => answerSurprise(i)} disabled={hasAnswered}
                            className={`p-4 rounded-xl border-2 text-left text-base font-bold mobile-btn transition
                              ${pickedCorrect ? 'bg-emerald-500 text-white border-emerald-600 shadow-lg'
                              : pickedWrong ? 'bg-rose-500 text-white border-rose-600 shadow-lg'
                              : picked ? 'app-accent-bg app-accent-border text-white'
                              : hasAnswered ? 'app-card-2 app-border app-text-3'
                              : 'app-card-3 app-text app-accent-border active:scale-95 shadow-md'}`}>
                            <span className="inline-block w-7 h-7 rounded-full text-center leading-7 mr-3 text-sm font-black shrink-0"
                              style={{ background: (picked || isLocalPicked) ? 'rgba(255,255,255,0.3)' : 'rgba(157,144,119,0.25)' }}>{['A','B','C','D'][i]}</span>
                            {o}
                            {pickedCorrect && <span className="ml-2">🎉</span>}
                            {pickedWrong && <span className="ml-2">❌</span>}
                          </button>
                        );
                      })}
                      <p className="text-center text-sm font-bold mt-1 app-text-2">
                        {hasAnswered ? '已作答，等待其他組或時間到…' : '請選擇答案'}
                      </p>
                    </div>
                  )}
                </main>
              </div>
            );
          }

          // 遊戲主畫面 (playing / gacha)
          const q = roomData.questions[roomData.qIndex];
          const team = myRole === 'host' ? null : roomData.teams[myRole];
          const buzzIsOpen = timeToOpen === 0;

          return (
            <div className="h-full flex flex-col font-sans overflow-hidden app-overlay">
              <ErrorModal />

              {/* ── 答對 / 答錯 動畫覆蓋層 ── */}
              {feedbackOverlay && (
                <div className={`fixed inset-0 z-[95] pointer-events-none flex items-center justify-center ${feedbackOverlay.type === 'correct' ? 'fb-bg-correct' : 'fb-bg-wrong'}`}>
                  <div className={feedbackOverlay.type === 'correct' ? 'fb-pop-correct' : 'fb-pop-wrong'}>
                    <div className="text-center">
                      <div className="text-9xl mb-2">{feedbackOverlay.type === 'correct' ? '🎉' : '❌'}</div>
                      <p className={`text-3xl font-black ${feedbackOverlay.yuanText || 'app-text'}`}>{feedbackOverlay.yuan}</p>
                      <p className={`text-5xl font-black mt-2 ${feedbackOverlay.type === 'correct' ? 'text-emerald-700' : 'text-rose-700'}`}>{feedbackOverlay.points > 0 ? '+' : ''}{feedbackOverlay.points} 分</p>
                    </div>
                  </div>
                </div>
              )}

              {/* ── 技能發動全域遮罩（遮住題目，所有人可見） ── */}
              {roomData.cardOverlay && (() => {
                const ov = roomData.cardOverlay;
                const isTarget = myRole !== 'host' && myRole === ov.targetGroup;
                const isPlayer = myRole !== 'host' && myRole === ov.playerGroup;
                const playerTeam = roomData.teams[ov.playerGroup];
                const targetTeam = ov.targetGroup ? roomData.teams[ov.targetGroup] : null;
                return (
                  <div className="fixed inset-0 z-[80] flex flex-col items-center justify-center safe-overlay animate-fade-in overflow-y-auto"
                    style={{ backgroundColor: isTarget ? 'rgba(252,232,232,0.97)' : 'rgba(247,242,232,0.97)',
                             border: isTarget ? '4px solid #E27A7A' : '4px solid #D4C9B6',
                             WebkitOverflowScrolling: 'touch' }}>

                  {/* 被攻擊者專屬：大字提示 */}
                  {isTarget && (
                    <div className="mb-4 text-center">
                      <div className="text-6xl mb-2" style={{animation:'bounce 0.6s infinite'}}>⚔️</div>
                      <p className="text-rose-700 text-3xl font-black">你被攻擊了！</p>
                      {ov.targetDelta !== null && ov.targetDelta !== undefined && (
                        <p className="text-rose-600 text-5xl font-black mt-2">{ov.targetDelta} 分</p>
                      )}
                    </div>
                  )}

                  {/* 旁觀者：大字提示 */}
                  {!isTarget && !isPlayer && (
                    <div className="mb-4 text-center">
                      <div className="text-5xl mb-2">⚡</div>
                      <p className={`text-2xl font-black ${playerTeam?.yuan?.text || 'app-text'}`}>{ov.yuanName}</p>
                      <p className="app-text text-lg font-bold mt-1">正在發動技能中...</p>
                      <p className="app-text-3 text-xs mt-1">時間暫停，請稍候</p>
                    </div>
                  )}

                  {/* 發動者資訊（被攻擊者 / 發動者自己 用的小標） */}
                  {(isTarget || isPlayer) && (
                    <p className="app-text-2 text-sm mb-0.5">⚡ 技能發動！</p>
                  )}
                  {(isTarget || isPlayer) && (
                    <p className={`text-xl font-black mb-3 ${playerTeam?.yuan?.text || 'app-text'}`}>
                      {ov.yuanName}
                    </p>
                  )}

                  {/* 卡牌框 */}
                  <div className="rounded-2xl p-4 text-center w-full max-w-xs mb-3"
                    style={{ background: 'rgba(212,180,131,0.20)', border: '2px solid #C9A574' }}>
                    <p className="app-accent-text text-xs font-bold mb-1">技能卡</p>
                    <p className="text-xl font-black app-text mb-2">【{ov.cardName}】</p>
                    <p className="text-sm app-text-2 leading-relaxed">{ov.cardDesc}</p>
                  </div>

                  {/* 目標 */}
                  {targetTeam && !isTarget && (
                    <div className="flex items-center gap-2 px-4 py-2 rounded-xl mb-2"
                      style={{ background: 'rgba(212,201,182,0.55)' }}>
                      <span className="app-text-2 text-xs">攻擊目標：</span>
                      <span className={`font-black text-base ${targetTeam.yuan?.text}`}>{ov.targetYuanName}</span>
                      {ov.targetDelta !== null && ov.targetDelta !== undefined && (
                        <span className="text-rose-600 font-black">{ov.targetDelta} 分</span>
                      )}
                    </div>
                  )}

                  {isPlayer && <p className="app-text-3 text-xs mt-1">技能效果將在 5 秒後結束</p>}
                  <p className="app-text-3 text-xs text-center max-w-xs mt-1">{ov.log}</p>
                  </div>
                );
              })()}

              {/* ── 選擇攻擊目標全域遮罩（fixed，不受 overflow-hidden 影響） ── */}
              {pendingCard && myRole !== 'host' && (
                <div className="fixed inset-0 z-[70] flex flex-col items-center justify-center safe-overlay animate-fade-in overflow-y-auto"
                  style={{ background: 'rgba(247,242,232,0.97)', WebkitOverflowScrolling: 'touch' }}>
                  <div className="w-full max-w-xs my-auto">
                    <p className="app-text-2 text-sm text-center mb-2">⚡ 準備發動技能</p>
                    <div className="rounded-2xl p-4 text-center mb-5"
                      style={{ background: 'rgba(212,180,131,0.22)', border: '2px solid #C9A574' }}>
                      <p className="app-accent-text font-black text-lg">【{pendingCard.name}】</p>
                      <p className="app-text-2 text-xs mt-1 leading-relaxed">{pendingCard.desc}</p>
                    </div>
                    <p className="text-rose-700 text-sm font-black text-center mb-3">⚔️ 選擇攻擊目標</p>
                    <div className="grid grid-cols-2 gap-3">
                      {Object.values(roomData.teams)
                        .filter(t => t.joined && t.id !== myRole && (roomData.scores?.[t.id] ?? 100) > 0)
                        .map(t => (
                          <button key={t.id} onClick={() => playCard(pendingCard, t.id)}
                            className={`py-5 rounded-2xl text-white font-black active:scale-95 transition shadow-lg ${t.yuan?.color}`}>
                            <span className="block text-base">{t.yuan?.name}</span>
                            <span className="block text-xs font-normal mt-0.5 opacity-80">{roomData.scores?.[t.id] ?? 0} 分</span>
                          </button>
                        ))}
                    </div>
                    <button onClick={() => setPendingCard(null)}
                      className="mt-4 w-full app-text-3 text-sm py-3 rounded-xl border app-border active:opacity-70">
                      取消
                    </button>
                  </div>
                </div>
              )}

              {/* 老師斷線時 useEffect 會自動把 state 改成 end，不需要 banner */}
              <header className="app-card border-b app-border shadow-md">
                <div className="p-3 flex justify-between items-center">
                  <span className="font-bold text-sm">房 {roomCode}</span>
                  <div className="flex items-center gap-2">
                    {roomData.state === 'playing' && !roomData.buzzerWinner && timeToOpen > 0 && (
                      <span className="bg-amber-500 text-black px-2 py-0.5 rounded-full text-xs font-black">{timeToOpen}s</span>
                    )}
                    {roomData.state === 'playing' && !roomData.buzzerWinner && timeToOpen === 0 && (
                      <span className="bg-emerald-500 text-white px-2 py-0.5 rounded-full text-xs font-black animate-pulse">搶答中</span>
                    )}
                    {roomData.buzzerWinner && answerTimeLeft !== null && (
                      <span className={`px-2 py-0.5 rounded-full text-xs font-black ${answerTimeLeft <= 3 ? 'bg-rose-500 text-white animate-pulse' : 'app-accent-bg'}`}>
                        ⏱ {answerTimeLeft}s
                      </span>
                    )}
                    <span className="app-card-2 px-3 py-1 rounded-full text-xs">第 {roomData.qIndex + 1} 題</span>
                  {myRole === 'host' && roomData.state === 'playing' && (
                    <button onClick={nextQ} className="app-accent-bg px-3 py-1 rounded-full text-xs font-bold active:scale-95 transition">跳過</button>
                  )}
                  {myRole === 'host' && (
                    <button onClick={() => setShowScoreboard(s => !s)}
                      className={`px-3 py-1 rounded-full text-xs font-bold active:scale-95 transition ${showScoreboard ? 'bg-yellow-500 text-black' : 'app-accent-bg'}`}>
                      {showScoreboard ? '遊戲' : '排行'}
                    </button>
                  )}
                  </div>
                </div>
                {/* 答題倒數進度條 */}
                {roomData.buzzerWinner && answerTimeLeft !== null && (
                  <div className="h-1 app-card-2 mx-3 mb-2 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-300 ${answerTimeLeft <= 3 ? 'bg-rose-500' : 'bg-amber-400'}`}
                      style={{ width: `${(answerTimeLeft / ANSWER_TIME_LIMIT) * 100}%` }} />
                  </div>
                )}
              </header>
              {myRole === 'host' && showScoreboard ? (
                <div className="flex-1 overflow-auto p-4 flex flex-col gap-3">
                  <h2 className="text-lg font-black text-center app-accent-text shrink-0">即時分數排行</h2>
                  {Object.values(roomData.teams)
                    .sort((a, b) => (roomData.scores?.[b.id] ?? 0) - (roomData.scores?.[a.id] ?? 0))
                    .map((t, idx) => {
                      const score = roomData.scores?.[t.id] ?? 0;
                      return (
                        <div key={t.id} className="relative app-card rounded-2xl overflow-hidden flex items-center px-5 py-5 gap-4 border-2 app-border shrink-0">
                          <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className={`yuan-bar ${t.yuan?.color}`} style={{ width: `${Math.min(100, score)}%` }} />
                          </div>
                          <span className="relative text-2xl w-10 text-center shrink-0">
                            {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`}
                          </span>
                          <div className="relative flex-1">
                            <p className={`text-2xl font-black ${t.yuan?.text}`}>{t.yuan?.name}</p>
                            <p className="text-xs app-text-3">{t.name}</p>
                          </div>
                          <span className={`relative text-4xl font-black ${score > 0 ? 'app-text' : 'app-text-3'}`}>
                            {score}<span className="text-sm app-text-3 ml-1">分</span>
                          </span>
                        </div>
                      );
                    })}
                </div>
              ) : (
              <main className="flex-1 flex flex-col p-3 gap-3 overflow-hidden">
                {/* HP 看板 */}
                <div className="shrink-0 flex flex-col gap-1.5">
                  {/* 我的分數大顯示（學生專屬）*/}
                  {myRole !== 'host' && team && (() => {
                    const myScore = roomData.scores?.[myRole] ?? 0;
                    const isBuzz = roomData.buzzerWinner === myRole;
                    const isWrong = (roomData.wrongAnswerers || []).includes(myRole);
                    const borderClass = team.yuan?.border || 'app-border';
                    const fx = roomData.statusEffects?.[myRole] || {};
                    return (
                      <div className={`relative rounded-xl border-2 overflow-hidden flex items-center px-3 py-2 gap-3 h-12
                        ${isBuzz ? 'border-yellow-400 bg-white' : `${borderClass} app-card`}
                        ${myScore <= 0 ? 'opacity-40' : ''}`}>
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                          <div className={`yuan-bar ${team.yuan?.color}`} style={{ width: `${Math.min(100, myScore)}%` }} />
                        </div>
                        <span className="relative text-[10px] font-bold app-text-3 shrink-0">我的</span>
                        <span className={`relative text-sm font-black shrink-0 ${isBuzz ? team.yuan?.text : 'app-text'}`}>{team.yuan?.name}</span>
                        {fx.shielded && <span className="relative text-[10px] bg-blue-100 text-blue-700 px-1 rounded shrink-0">🛡護</span>}
                        {fx.doublePoints && <span className="relative text-[10px] bg-yellow-100 text-yellow-700 px-1 rounded shrink-0">×2</span>}
                        {fx.priorityBuzz && <span className="relative text-[10px] bg-emerald-100 text-emerald-700 px-1 rounded shrink-0">優先</span>}
                        <div className="relative flex-1 text-right">
                          <span className={`text-2xl font-black ${isBuzz ? 'text-black' : myScore <= 20 ? 'text-rose-500' : 'app-text'}`}>{myScore}</span>
                          <span className="text-xs app-text-3 ml-1">分</span>
                        </div>
                        {isWrong && myScore > 0 && <span className="relative text-[10px] text-rose-400 font-bold shrink-0">已答題</span>}
                        {myScore <= 0 && <span className="relative text-[10px] app-text-3 font-bold shrink-0">已淘汰</span>}
                      </div>
                    );
                  })()}
                  {/* 全體迷你分數 */}
                  <div className="grid grid-cols-5 gap-1.5 h-14">
                    {Object.values(roomData.teams).map(t => {
                      const score = roomData.scores?.[t.id] ?? 0;
                      const buzz = roomData.buzzerWinner === t.id;
                      const wronged = (roomData.wrongAnswerers || []).includes(t.id);
                      const isMe = t.id === myRole;
                      return (
                        <div key={t.id} className={`relative rounded-xl border-2 transition-all flex flex-col justify-center items-center overflow-hidden
                          ${buzz ? 'border-yellow-400 app-card-3 z-10' : wronged ? 'border-rose-400 app-card-2' : isMe ? `${t.yuan?.border} app-card` : 'app-card app-border'}
                          ${score <= 0 ? 'opacity-30 grayscale' : ''}`}>
                          <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className={`yuan-bar ${t.yuan?.color}`} style={{ width: `${Math.min(100, score)}%` }}></div>
                          </div>
                          <p className="text-[8px] font-bold app-text-3">{t.name}</p>
                          <p className={`text-[10px] sm:text-sm font-black ${buzz ? t.yuan?.text : t.yuan?.text}`}>{t.yuan?.name}</p>
                          <p className={`text-[10px] font-black ${buzz ? 'text-black' : 'app-text-2'}`}>{score}分</p>
                          {wronged && score > 0 && <p className="text-[8px] text-rose-400 font-bold">已答</p>}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 題目區（可滾動，避免小螢幕內容被截斷） */}
                <div className={`flex-1 app-card p-4 rounded-2xl border-4 flex flex-col gap-3 overflow-y-auto min-h-0
                  ${roomData.buzzerWinner ? 'border-yellow-400' : buzzIsOpen && roomData.state === 'playing' ? 'border-emerald-600' : 'app-border'}`}
                  style={{ WebkitOverflowScrolling: 'touch' }}>
                  {/* 搶答前：題目佔滿整個卡片置中；搶答後：題目在上、選項在下 */}
                  {!roomData.buzzerWinner ? (
                    <div className="flex-1 flex flex-col items-center justify-center text-center px-2">
                      <h2 className="text-2xl sm:text-3xl font-black mobile-q-text app-text leading-relaxed">{q.text}</h2>
                      <p className="mt-6 text-sm app-text-3 font-bold tracking-wider">
                        {buzzIsOpen ? '⚡ 搶答開放！' : '⏳ 倒數中…按下搶答後才顯示選項'}
                      </p>
                    </div>
                  ) : (
                    <>
                      <h2 className="text-xl sm:text-2xl font-black mobile-q-text shrink-0 app-text">{q.text}</h2>
                      <div className="flex flex-col gap-2 animate-fade-in">
                        {q.options.map((o, i) => {
                          const isPickedByMe = localAnswerResult?.scope === 'regular' && localAnswerResult.idx === i;
                          const pickedCorrect = isPickedByMe && localAnswerResult.isCorrect;
                          const pickedWrong   = isPickedByMe && !localAnswerResult.isCorrect;
                          return (
                            <button key={i} onClick={() => handleAnswer(i)} disabled={myRole !== roomData.buzzerWinner || !!localAnswerResult}
                              className={`p-3 sm:p-4 rounded-xl border-2 text-left text-base font-bold mobile-btn transition
                                ${pickedCorrect ? 'bg-emerald-500 text-white border-emerald-600 shadow-lg'
                                : pickedWrong ? 'bg-rose-500 text-white border-rose-600 shadow-lg'
                                : myRole === roomData.buzzerWinner ? 'app-card-3 app-text app-accent-border active:scale-95 shadow-md'
                                : 'app-card-2 app-border-soft app-text-3'}`}>
                              <span className="inline-block w-7 h-7 rounded-full text-center leading-7 mr-3 text-sm font-black shrink-0"
                                style={{ background: isPickedByMe ? 'rgba(255,255,255,0.3)' : 'rgba(157,144,119,0.25)' }}>{['A', 'B', 'C', 'D'][i]}</span>
                              {o}
                              {pickedCorrect && <span className="ml-2">🎉</span>}
                              {pickedWrong && <span className="ml-2">❌</span>}
                            </button>
                          );
                        })}
                      </div>
                    </>
                  )}
                </div>

                {/* 搶答／技能卡區域 —— 固定高度，避免倒數/卡片/搶答按鈕切換時題目跳動 */}
                {myRole !== 'host' && (
                  <div className="shrink-0 overflow-y-auto transition-all duration-300"
                    style={{
                      height: roomData.state === 'playing' && !roomData.buzzerWinner ? '34vh' : '0px',
                      opacity: roomData.state === 'playing' && !roomData.buzzerWinner ? 1 : 0,
                      WebkitOverflowScrolling: 'touch'
                    }}>
                    {roomData.state === 'playing' && !roomData.buzzerWinner && renderBuzzerArea(team)}
                  </div>
                )}

                {/* 戰況 log */}
                <div className="h-20 app-card-2 p-3 rounded-xl border-2 app-border font-mono text-[10px] overflow-hidden flex flex-col-reverse shrink-0">
                  {roomData.actionLog.map((l, i) => <div key={i} className={i === 0 ? 'app-text font-bold' : 'app-text-3'}>{l}</div>)}
                </div>
              </main>
              )}

              {/* 手牌總覽浮層（Host 可查看各組卡牌，學生不顯示他人手牌）*/}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
