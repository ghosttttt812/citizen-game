        // ── 音效系統（Web Audio API，不需外部檔案）──────────────
        const sound = (() => {
          let ctx = null;
          const get = () => {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            return ctx;
          };
          const play = (freq, type, dur, freqEnd) => {
            try {
              const c = get();
              const osc = c.createOscillator();
              const gain = c.createGain();
              osc.connect(gain);
              gain.connect(c.destination);
              osc.type = type;
              osc.frequency.setValueAtTime(freq, c.currentTime);
              if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, c.currentTime + dur);
              gain.gain.setValueAtTime(0.3, c.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
              osc.start(c.currentTime);
              osc.stop(c.currentTime + dur);
            } catch (e) {}
          };
          return {
            // 倒數 tick（每秒一聲）
            tick: () => play(660, 'sine', 0.12),
            // 搶答開放（上揚音）
            go: () => {
              play(880, 'sine', 0.15);
              setTimeout(() => play(1047, 'sine', 0.25), 100);
            },
            // 有人搶答
            buzz: () => play(440, 'square', 0.12),
            // 答對（三音上揚）
            correct: () => {
              play(523, 'sine', 0.2);
              setTimeout(() => play(659, 'sine', 0.2), 150);
              setTimeout(() => play(784, 'sine', 0.4), 300);
            },
            // 答錯（下降音）
            wrong: () => play(280, 'sawtooth', 0.4, 160),
            // 遊戲開始倒數（低沉）
            syncTick: () => play(330, 'sine', 0.18),
            // 攻擊卡發動
            attack: () => play(160, 'sawtooth', 0.35, 100),
            // 抽卡
            draw: () => {
              play(330, 'triangle', 0.1);
              setTimeout(() => play(440, 'triangle', 0.1), 80);
              setTimeout(() => play(550, 'triangle', 0.25), 160);
            },
            // 遊戲結束（四音上揚）
            victory: () => {
              play(523, 'sine', 0.2);
              setTimeout(() => play(659, 'sine', 0.2), 220);
              setTimeout(() => play(784, 'sine', 0.2), 440);
              setTimeout(() => play(1047, 'sine', 0.5), 660);
            },
          };
        })();
    </script>

    <script>
      const bgm = (() => {
        const lobby = new Audio('Last Cappuccino in Rio - Chris Haugen.mp3');
        const game  = new Audio('Helios - Jeremy Black.mp3');
        lobby.loop = true;  lobby.volume = 0.35;
        game.loop  = true;  game.volume  = 0.40;

        let active   = null;
        let unlocked = false;
        let pending  = 'lobby';   // 使用者互動前暫存

        const _switch = (next) => {
          if (active === next) return;
          // 淡出舊曲
          if (active) {
            const old = active;
            const fade = setInterval(() => {
              if (old.volume > 0.03) { old.volume = Math.max(0, old.volume - 0.03); }
              else { old.pause(); old.currentTime = 0; old.volume = old === lobby ? 0.35 : 0.40; clearInterval(fade); }
            }, 40);
          }
          // 淡入新曲
          next.volume = 0;
          next.play().catch(() => {});
          const fadeIn = setInterval(() => {
            const target = next === lobby ? 0.35 : 0.40;
            if (next.volume < target - 0.03) { next.volume = Math.min(target, next.volume + 0.03); }
            else { next.volume = target; clearInterval(fadeIn); }
          }, 40);
          active = next;
        };

        const unlock = () => {
          if (unlocked) return;
          unlocked = true;
          _switch(pending === 'game' ? game : lobby);
        };

        // 第一次觸碰即解鎖（瀏覽器 autoplay 政策）
        document.addEventListener('click',      unlock, { once: true });
        document.addEventListener('touchstart', unlock, { once: true });

        return {
          toLobby: () => { pending = 'lobby'; if (unlocked) _switch(lobby); },
          toGame:  () => { pending = 'game';  if (unlocked) _switch(game);  },
        };
      })();
    </script>

          c09: '發動者可以自行選擇要更動「分數」或「牌卡」。全場五個組別必須將選定的項目（目前所有的分數，或手中所有未使用的共同牌卡），全部統一往左邊傳交給下一組。',
          c10: '國庫撥款！發動後，場上所有組別（包含自己）立刻各加 10 分。作為代價，發動此卡的組別可以在牌堆中免費「抽 1 張」新的共同卡。',
        };

        // QUESTION_BANK 來自外部 questions.js

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        const CORRECT_POINTS = 40;      // 答對得分
        const WRONG_PENALTY  = 15;      // 答錯扣分
        const BUZZ_DELAY_NEW_Q = 5;    // 新題目搶答延遲秒數（技能發動窗口）
        const BUZZ_DELAY_RETRY = 1;    // 答錯後換人搶答延遲
        const ANSWER_TIME_LIMIT = 10;  // 答題時間上限（秒）

        function App() {
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [roomCode, setRoomCode] = useState('');
          const [roomData, setRoomData] = useState(null);
          const [myRole, setMyRole] = useState(null);
          const [joinInput, setJoinInput] = useState('');
          const [errorMsg, setErrorMsg] = useState('');
          const [syncCountdown, setSyncCountdown] = useState(null);
          const [timeToOpen, setTimeToOpen] = useState(null);       // 搶答開放倒數
          const [answerTimeLeft, setAnswerTimeLeft] = useState(null); // 答題剩餘秒數
          const [showScoreboard, setShowScoreboard] = useState(false);
          const [pendingCard, setPendingCard] = useState(null);
          const [pendingGroup, setPendingGroup] = useState(null);
          const [cardRevealed, setCardRevealed] = useState(false);
          const [showRules, setShowRules] = useState(false);
          const [rulesTab, setRulesTab] = useState(0);
          const [flippedCards, setFlippedCards] = useState({});

          const prevBuzzerWinner = useRef(null);
          const prevState = useRef(null);
          const prevWrongLen = useRef(0);
          const prevTimeToOpen = useRef(null);
          const prevSyncCountdown = useRef(null);
          const prevLastRoundWinner = useRef(null);
          const timeoutFired = useRef(false);

          const showError = (msg) => setErrorMsg(msg);

          const ErrorModal = () => {
            if (!errorMsg) return null;
            return (
              <div className="fixed inset-0 z-[100] bg-black/70 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-slate-800 border-4 border-rose-500 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                  <div className="text-5xl mb-4">⚠️</div>
                  <h3 className="text-2xl font-black text-white mb-3">系統提示</h3>
                  <p className="text-slate-300 font-medium mb-8 whitespace-pre-wrap leading-relaxed">{errorMsg}</p>
                  <button onClick={() => setErrorMsg('')} className="w-full bg-rose-500 text-white font-black text-lg py-4 rounded-xl active:scale-95 transition">
                    我知道了
                  </button>
                </div>
              </div>
            );
          };

          // Firebase Auth
          useEffect(() => {
            auth.signInAnonymously().catch(() => showError("連線至伺服器失敗，請重新整理網頁。"));
            const unsubscribe = auth.onAuthStateChanged((u) => {
              setUser(u);
              setIsConnecting(false);
            });
            return () => unsubscribe();
          }, []);

          // 監聽房間資料
          useEffect(() => {
            if (!user || !roomCode) return;
            const unsubscribe = db.collection('rooms_v2').doc(roomCode).onSnapshot(
              (doc) => {
                if (doc.exists) {
                  const data = doc.data();
                  setRoomData(data);
                  if (data.state === 'countdown' && data.startTime) {
                    const diff = Math.ceil((data.startTime - Date.now()) / 1000);
                    setSyncCountdown(diff > 0 ? diff : 0);
                  } else {
                    setSyncCountdown(null);
                  }
                } else {
                  showError("房間不存在或已由房主關閉！");
                  setRoomCode(''); setMyRole(null);
                }
              },
              () => showError("資料同步中斷，請確認網路連線！")
            );
            return () => unsubscribe();
          }, [user, roomCode]);

          // 同步倒數計時
          useEffect(() => {
            if (syncCountdown !== null && syncCountdown > 0) {
              const timer = setTimeout(() => setSyncCountdown(syncCountdown - 1), 1000);
              return () => clearTimeout(timer);
            } else if (syncCountdown === 0 && myRole === 'host') {
              db.collection('rooms_v2').doc(roomCode).update({
                state: 'playing',
                buzzerOpenAt: Date.now() + BUZZ_DELAY_NEW_Q * 1000,
                wrongAnswerers: []
              });
            }
          }, [syncCountdown]);

          // 搶答開放倒數（本地計算）
          useEffect(() => {
            if (!roomData || roomData.state !== 'playing' || !roomData.buzzerOpenAt) {
              setTimeToOpen(null);
              return;
            }
            const update = () => {
              const remaining = Math.ceil((roomData.buzzerOpenAt - Date.now()) / 1000);
              setTimeToOpen(Math.max(0, remaining));
            };
            update();
            const interval = setInterval(update, 200);
            return () => clearInterval(interval);
          }, [roomData?.buzzerOpenAt, roomData?.state]);

          // 答題倒數（本地計算）
          useEffect(() => {
            if (!roomData || !roomData.buzzerWinner || !roomData.answerDeadline || roomData.state !== 'playing') {
              setAnswerTimeLeft(null);
              timeoutFired.current = false;
              return;
            }
            const update = () => {
              const remaining = Math.ceil((roomData.answerDeadline - Date.now()) / 1000);
              setAnswerTimeLeft(Math.max(0, remaining));
            };
            update();
            const interval = setInterval(update, 200);
            return () => clearInterval(interval);
          }, [roomData?.answerDeadline, roomData?.buzzerWinner, roomData?.state]);

          // 答題超時處理（只由 buzzerWinner 的客戶端觸發）
          useEffect(() => {
            if (answerTimeLeft !== 0 || timeoutFired.current) return;
            if (!roomData || myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            timeoutFired.current = true;
            handleTimeout();
          }, [answerTimeLeft]);

          // 音效：根據狀態變化觸發
          useEffect(() => {
            if (!roomData) return;
            if (roomData.buzzerWinner && roomData.buzzerWinner !== prevBuzzerWinner.current) sound.buzz();
            prevBuzzerWinner.current = roomData.buzzerWinner;
            if (roomData.lastRoundWinner && roomData.lastRoundWinner !== prevLastRoundWinner.current) sound.correct();
            prevLastRoundWinner.current = roomData.lastRoundWinner;
            if (roomData.state === 'end' && prevState.current !== 'end') sound.victory();
            prevState.current = roomData.state;
            const currWrongLen = (roomData.wrongAnswerers || []).length;
            if (currWrongLen > prevWrongLen.current) sound.wrong();
            prevWrongLen.current = currWrongLen;
          }, [roomData]);

          // BGM：依遊戲狀態切換
          useEffect(() => {
            if (!roomData || roomData.state === 'lobby' || roomData.state === 'countdown' || roomData.state === 'end') {
              bgm.toLobby();
            } else if (roomData.state === 'playing') {
              bgm.toGame();
            }
          }, [roomData?.state]);

          // 心跳：每 25 秒寫入（供斷線偵測）
          useEffect(() => {
            if (!roomCode || !myRole) return;
            const write = () => db.collection('rooms_v2').doc(roomCode).update({
              [`heartbeats.${myRole}`]: Date.now()
            }).catch(() => {});
            write();
            const iv = setInterval(write, 25000);
            return () => clearInterval(iv);
          }, [roomCode, myRole]);

          // 老師斷線 → 自動結束遊戲（任一在線學生觸發，寫一次即可）
          useEffect(() => {
            if (!roomData || !roomCode || myRole === 'host') return;
            if (!['playing', 'countdown'].includes(roomData.state)) return;
            const hb = roomData.heartbeats?.host;
            if (!hb || hb === 0) return; // host 從未連過，不誤判
            if (Date.now() - hb > 60000) {
              db.collection('rooms_v2').doc(roomCode).update({
                state: 'end',
                cardOverlay: null,
                actionLog: ['💀 老師端斷線，遊戲強制結束！', ...(roomData.actionLog || [])].slice(0, 5)
              }).catch(() => {});
            }
          }, [roomData]);

          // 技能遮罩自動清除（由發動者的客戶端負責）
          useEffect(() => {
            if (!roomData?.cardOverlay || !roomCode) return;
            const { showUntil, remainingMs, playerGroup } = roomData.cardOverlay;
            if (playerGroup !== myRole) return;
            const delay = Math.max(0, showUntil - Date.now());
            const timer = setTimeout(() => {
              db.collection('rooms_v2').doc(roomCode).update({
                cardOverlay: null,
                buzzerOpenAt: Date.now() + Math.max(500, remainingMs),
              }).catch(() => {});
            }, delay);
            return () => clearTimeout(timer);
          }, [roomData?.cardOverlay]);

          // 音效：遊戲開始同步倒數
          useEffect(() => {
            if (syncCountdown === null || syncCountdown === 0) return;
            if (syncCountdown !== prevSyncCountdown.current) sound.syncTick();
            prevSyncCountdown.current = syncCountdown;
          }, [syncCountdown]);

          // 音效：搶答倒數 tick 和開放音
          useEffect(() => {
            if (timeToOpen === null) return;
            if (timeToOpen > 0 && timeToOpen !== prevTimeToOpen.current) sound.tick();
            if (timeToOpen === 0 && prevTimeToOpen.current !== null && prevTimeToOpen.current > 0) sound.go();
            prevTimeToOpen.current = timeToOpen;
          }, [timeToOpen]);

          // ── 遊戲邏輯 ─────────────────────────────────────────

          const roomRef = () => db.collection('rooms_v2').doc(roomCode);

          // 選院時先跳出說明 + 抽卡確認
          const handleGroupSelect = (t) => {
            if (t.joined) { showError('手腳太慢！此組別已被選走了。'); return; }
            const excCard = roomData.hands?.[t.id]?.[0] || null;
            const comCard = roomData.hands?.[t.id]?.[1] || null;
            setPendingGroup({ gid: t.id, team: t, excCard, comCard });
            setCardRevealed(false);
          };

          // 為每組建立初始手牌（1張院專屬 + 1張隨機共同卡）
          const buildInitialHands = () => {
            const yuanKeys = ['executive', 'legislative', 'judicial', 'examination', 'control'];
            const shuffledCommon = shuffle(COMMON_CARD_POOL);
            const hands = {};
            ['group1','group2','group3','group4','group5'].forEach((gid, i) => {
              const yuanKey = yuanKeys[i];
              const exclusiveBase = YUAN_EXCLUSIVE_CARDS[yuanKey];
              hands[gid] = [
                { ...exclusiveBase, uniqueId: `${gid}_exc`, isExclusive: true, usedOnQ: null },
                { ...shuffledCommon[i], uniqueId: `${gid}_com0`, isExclusive: false, usedOnQ: null },
              ];
            });
            return hands;
          };

          const createRoom = async () => {
            if (!user) { showError("尚未連線到伺服器，請稍候再試！"); return; }
            try {
              const code = Math.random().toString(36).substring(2, 6).toUpperCase();
              await db.collection('rooms_v2').doc(code).set({
                state: 'lobby', hostUid: user.uid,
                teams: {
                  group1: { id: 'group1', name: '第 1 組', joined: false, yuan: YUAN_DB[0] },
                  group2: { id: 'group2', name: '第 2 組', joined: false, yuan: YUAN_DB[1] },
                  group3: { id: 'group3', name: '第 3 組', joined: false, yuan: YUAN_DB[2] },
                  group4: { id: 'group4', name: '第 4 組', joined: false, yuan: YUAN_DB[3] },
                  group5: { id: 'group5', name: '第 5 組', joined: false, yuan: YUAN_DB[4] }
                },
                scores: { group1: 100, group2: 100, group3: 100, group4: 100, group5: 100 },
                hands: buildInitialHands(),
                lastRoundWinner: null,
                lastRoundPoints: 0,
                statusEffects: {
                  group1: { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false },
                  group2: { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false },
                  group3: { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false },
                  group4: { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false },
                  group5: { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false },
                },
                questions: shuffle(QUESTION_BANK),
                qIndex: 0, buzzerWinner: null,
                buzzerOpenAt: 0, answerDeadline: null, wrongAnswerers: [],
                cardOverlay: null,
                heartbeats: { host: Date.now(), group1: 0, group2: 0, group3: 0, group4: 0, group5: 0 },
                actionLog: ['🎯 遊戲房間已建立，等待各組加入...']
              });
              setRoomCode(code);
              setMyRole('host');
            } catch (e) { showError("建立房間失敗：" + e.message); }
          };

          const joinRoom = async () => {
            if (!user) { showError("連線中，請稍候！"); return; }
            if (!joinInput || joinInput.length !== 4) { showError("請輸入正確的 4 碼房間代碼！"); return; }
            try {
              const code = joinInput.toUpperCase();
              const snap = await db.collection('rooms_v2').doc(code).get();
              if (snap.exists) setRoomCode(code);
              else showError(`找不到代碼為「${code}」的房間！\n請確認老師大螢幕上的代碼。`);
            } catch (e) { showError("加入房間失敗：" + e.message); }
          };

          const selectGroup = async (gid) => {
            if (!roomData) return;
            if (roomData.teams[gid].joined) { showError("手腳太慢！此組別已被選走了。"); return; }
            try {
              await roomRef().update({ [`teams.${gid}.joined`]: true, [`teams.${gid}.uid`]: user.uid });
              setMyRole(gid);
            } catch (e) { showError("選擇組別時發生錯誤：" + e.message); }
          };

          const leaveRoom = () => { setRoomCode(''); setRoomData(null); setMyRole(null); };

          const startSync = () => {
            roomRef().update({
              state: 'countdown',
              startTime: Date.now() + 5000,
              actionLog: ['🎲 5秒後正式開始！', ...roomData.actionLog].slice(0, 5)
            });
          };

          const handleBuzz = () => {
            if (roomData.buzzerWinner) return;
            if ((roomData.scores[myRole] || 0) <= 0) return;
            if ((roomData.wrongAnswerers || []).includes(myRole)) return;
            // 有優先搶答權的人可直接搶，其他人要等倒數結束
            const hasPriority = roomData.statusEffects?.[myRole]?.priorityBuzz;
            if (!hasPriority && Date.now() < roomData.buzzerOpenAt) return;
            // 清除 priorityBuzz 效果
            const newStatus = JSON.parse(JSON.stringify(roomData.statusEffects || {}));
            if (newStatus[myRole]) newStatus[myRole].priorityBuzz = false;
            roomRef().update({
              buzzerWinner: myRole,
              answerDeadline: Date.now() + ANSWER_TIME_LIMIT * 1000,
              statusEffects: newStatus,
            });
          };

          const handleAnswer = (idx) => {
            const isCorrect = idx === roomData.questions[roomData.qIndex].answer;
            const myYuan = roomData.teams[myRole].yuan.name;

            if (isCorrect) {
              const isDouble = roomData.statusEffects?.[myRole]?.doublePoints;
              const gained = isDouble ? CORRECT_POINTS * 2 : CORRECT_POINTS;
              const newScores = { ...roomData.scores, [myRole]: (roomData.scores[myRole] || 0) + gained };
              // 清除本人 doublePoints 效果
              const newStatus = { ...roomData.statusEffects };
              if (newStatus[myRole]) newStatus[myRole] = { ...newStatus[myRole], doublePoints: false };
              roomRef().update({
                scores: newScores,
                statusEffects: newStatus,
                answerDeadline: null,
                lastRoundWinner: myRole,
                lastRoundPoints: gained,
                actionLog: [`✅ ${myYuan} 答對！+${gained} 分${isDouble ? '（重大建設加倍！）' : ''}`, ...roomData.actionLog].slice(0, 5)
              });
              setTimeout(() => nextQ(), 1500);
            } else {
              applyWrongAnswer(myYuan, '答錯');
            }
          };

          const handleTimeout = () => {
            if (!roomData || myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            applyWrongAnswer(roomData.teams[myRole].yuan.name, '超時');
          };

          // 答錯/超時的共用邏輯
          const applyWrongAnswer = (yuanName, reason) => {
            const newScores = { ...roomData.scores, [myRole]: Math.max(0, (roomData.scores[myRole] || 0) - WRONG_PENALTY) };
            const newWrong = [...(roomData.wrongAnswerers || []), myRole];
            // 只考慮已加入的組別，避免未加入組別卡住流程
            const joinedIds = Object.values(roomData.teams).filter(t => t.joined).map(t => t.id);
            const remaining = joinedIds.filter(k => newScores[k] > 0 && !newWrong.includes(k));

            if (remaining.length === 0) {
              roomRef().update({
                scores: newScores, buzzerWinner: null, wrongAnswerers: [], answerDeadline: null,
                actionLog: [`❌ ${yuanName} ${reason}！全員作答完畢，跳過本題`, ...roomData.actionLog].slice(0, 5)
              });
              setTimeout(() => nextQ(), 1500);
            } else {
              roomRef().update({
                scores: newScores, buzzerWinner: null, answerDeadline: null,
                wrongAnswerers: newWrong,
                buzzerOpenAt: Date.now() + BUZZ_DELAY_RETRY * 1000,
                actionLog: [`❌ ${yuanName} ${reason}！換人搶答 (-${WRONG_PENALTY} 分)`, ...roomData.actionLog].slice(0, 5)
              });
            }
          };

          // 發動技能卡
          const playCard = (card, targetId = null) => {
            if (!roomData || !myRole || myRole === 'host') return;
            if (roomData.statusEffects?.[myRole]?.cardBanned) { showError('本回合被輿論炎上，無法發動技能卡！'); return; }
            // 同一題只能發動一張（usedOnQ === 本題 index）
            const myHand = roomData.hands?.[myRole] || [];
            if (myHand.some(c => c.usedOnQ === roomData.qIndex)) { showError('本回合只能發動一張技能卡！'); return; }

            sound.draw();
            const myYuan = roomData.teams[myRole].yuan.name;
            const targetYuan = targetId ? roomData.teams[targetId]?.yuan?.name : null;
            let scores = { ...roomData.scores };
            let statusEffects = JSON.parse(JSON.stringify(roomData.statusEffects || {}));
            let hands = JSON.parse(JSON.stringify(roomData.hands || {}));
            let log = `⚡ ${myYuan} 發動「${card.name}」`;

            // 標記為已使用（記錄用在第幾題）
            hands[myRole] = hands[myRole].map(c =>
              c.uniqueId === card.uniqueId ? { ...c, usedOnQ: roomData.qIndex } : c
            );

            // 效果處理
            switch (card.type) {
              case 'target':
                if (targetId) {
                  scores[targetId] = Math.max(0, (scores[targetId] || 0) - (card.dmg || 50));
                  if (card.id === 'con' && hands[targetId]) {
                    const ci = hands[targetId].findIndex(c => !c.isExclusive && c.usedOnQ === null);
                    if (ci !== -1) hands[targetId][ci].usedOnQ = -1; // -1 = 被棄置
                  }
                  log += `，鎖定 ${targetYuan}（-${card.dmg || 50} 分）`;
                }
                break;
              case 'redistribute':
                { const entries = Object.entries(scores).sort((a,b) => b[1]-a[1]);
                  const top = entries[0][0], bot = entries[entries.length-1][0];
                  if (top !== bot) { scores[top] = Math.max(0, scores[top]-20); scores[bot] += 20; }
                  log += `，${roomData.teams[top]?.yuan?.name} 轉移 20 分給 ${roomData.teams[bot]?.yuan?.name}`; }
                break;
              case 'all-bonus':
                Object.keys(scores).forEach(k => { scores[k] = (scores[k]||0) + 10; });
                { const extra = shuffle(COMMON_CARD_POOL)[0];
                  hands[myRole].push({ ...extra, uniqueId: `${myRole}_extra_${Date.now()}`, isExclusive: false, usedOnQ: null }); }
                log += `，全場各 +10 分，本組再抽一張共同卡`;
                break;
              case 'double-points':
                if (!statusEffects[myRole]) statusEffects[myRole] = {};
                statusEffects[myRole].doublePoints = true;
                log += `，本回合答對得 80 分`;
                break;
              case 'card-ban':
                if (targetId) {
                  if (!statusEffects[targetId]) statusEffects[targetId] = {};
                  statusEffects[targetId].cardBanned = true;
                  log += `，${targetYuan} 下回合禁用技能卡`;
                }
                break;
              case 'reactive':
              case 'shield':
                if (!statusEffects[myRole]) statusEffects[myRole] = {};
                statusEffects[myRole].shielded = true;
                log += `，已設置防禦護盾`;
                break;
              case 'priority-next':
                if (!statusEffects[myRole]) statusEffects[myRole] = {};
                statusEffects[myRole].priorityBuzz = true;
                log += `，下一回合享優先搶答權`;
                break;
              case 'auto':
                { const lw = roomData.lastRoundWinner, lp = roomData.lastRoundPoints || 0;
                  if (lw && lp > 0) {
                    scores[lw] = Math.max(0, (scores[lw]||0) - lp);
                    log += `，撤銷 ${roomData.teams[lw]?.yuan?.name} 上回合得分 (-${lp} 分)`;
                  } else { log += `，上回合無可撤銷的得分`; } }
                break;
              default:
                log += `（效果開發中）`;
            }

            // 計算搶答倒數剩餘毫秒（用於解除暫停後恢復）
            const remainingMs = Math.max(500, roomData.buzzerOpenAt - Date.now());

            // 計算被攻擊者的分數變化（供 overlay 顯示）
            let targetDelta = null;
            if (targetId) {
              const before = roomData.scores?.[targetId] ?? 0;
              const after = scores[targetId] ?? 0;
              if (before !== after) targetDelta = after - before; // 負數代表扣分
            }

            sound.attack();
            roomRef().update({
              scores, hands, statusEffects,
              buzzerOpenAt: Date.now() + 999999,
              cardOverlay: {
                playerGroup: myRole,
                yuanName: myYuan,
                cardName: card.name,
                cardDesc: card.desc,
                log,
                targetGroup: targetId || null,

                    {Object.values(roomData.teams).map(t => (
                      <button key={t.id} onClick={() => handleGroupSelect(t)} disabled={t.joined}
                        className={`p-4 rounded-xl font-black text-sm transition text-white
                          ${t.joined ? 'bg-slate-700 text-slate-500 opacity-50' : `${t.yuan?.color} active:scale-95`}`}>
                        {t.yuan?.name}
                      </button>
                    ))}
                  </div>
                  </div>
                ) : (
                  <div className="text-emerald-400 text-xl font-black animate-pulse">連線成功！等待老師啟動</div>
                )}
              </div>

              {/* ── 選院確認 Modal ── */}
              {pendingGroup && (
                <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 overflow-auto animate-fade-in">
                  <div className="bg-slate-900 rounded-3xl border-4 border-yellow-400 p-6 max-w-xs w-full space-y-4">
                    <div className="text-center">
                      <p className="text-slate-400 text-sm">你選擇了</p>
                      <h2 className={`text-2xl font-black ${pendingGroup.team.yuan?.text}`}>{pendingGroup.team.yuan?.name}</h2>
                    </div>

                    {/* 院專屬技能卡 */}
                    <div className={`rounded-2xl p-4 border-2 border-yellow-500 bg-yellow-500/10`}>
                      <p className="text-[10px] text-yellow-400 font-bold mb-1">⭐ 院專屬技能卡（開局持有）</p>
                      <p className={`text-base font-black mb-2 ${pendingGroup.team.yuan?.text}`}>
                        【{pendingGroup.excCard?.name}】
                      </p>
                      <p className="text-xs text-slate-300 leading-relaxed">{pendingGroup.excCard?.desc}</p>
                    </div>

                    {/* 共同卡抽取 */}
                    {!cardRevealed ? (
                      <button onClick={() => { sound.draw(); setCardRevealed(true); }}
                        className="w-full bg-purple-600 text-white py-4 rounded-2xl font-black text-base active:scale-95 transition animate-pulse">
                        🎴 抽取共同技能卡
                      </button>
                    ) : (
                      <div className="rounded-2xl p-4 border-2 border-purple-400 bg-purple-500/10 animate-fade-in">
                        <p className="text-[10px] text-purple-400 font-bold mb-1">🎴 隨機共同技能卡</p>
                        <p className="text-base font-black text-white mb-2">
                          【{pendingGroup.comCard?.name}】
                        </p>
                        <p className="text-xs text-slate-300 leading-relaxed">{pendingGroup.comCard?.desc}</p>
                      </div>
                    )}

                    {cardRevealed && (
                      <button onClick={() => { selectGroup(pendingGroup.gid); setPendingGroup(null); setCardRevealed(false); }}
                        className="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-xl active:scale-95 transition">
                        ✅ 確認加入！
                      </button>
                    )}
                    {!cardRevealed && (
                      <button onClick={() => { setPendingGroup(null); setCardRevealed(false); }}
                        className="w-full text-slate-500 text-sm py-2 active:opacity-70">
                        ← 返回重選
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );

          if (roomData.state === 'end') return (
            <div className="h-full flex flex-col items-center justify-center p-6 bg-black/55 animate-fade-in">
              <ErrorModal />
              <div className="bg-slate-800 p-8 rounded-3xl border-4 border-yellow-500 text-center shadow-2xl w-full max-w-sm">
                <div className="text-6xl mb-4">👑</div>
                <h2 className="text-3xl font-black text-yellow-400 mb-6">戰鬥結束！</h2>
                <div className="space-y-2 mb-8 text-left">
                  {Object.values(roomData.teams)
                    .sort((a, b) => (roomData.scores?.[b.id] ?? 0) - (roomData.scores?.[a.id] ?? 0))
                    .map((t, idx) => (
                      <div key={t.id} className="flex justify-between items-center bg-slate-900 px-4 py-3 rounded-xl">
                        <span className="font-black flex items-center gap-2">
                          <span className="text-slate-500 text-sm w-4">{idx + 1}.</span>
                          <span className={t.yuan?.text}>{t.yuan?.name}</span>
                          <span className="text-slate-500 text-xs">{t.name}</span>
                        </span>
                        <span className={`font-black ${(roomData.scores?.[t.id] ?? 0) > 0 ? 'text-yellow-400' : 'text-rose-500'}`}>{roomData.scores?.[t.id] ?? 0} 分</span>
                      </div>
                    ))}
                </div>
                {myRole === 'host' ? (
                  <button onClick={resetGame} className="w-full bg-white text-black py-4 rounded-full font-black text-lg active:scale-95 transition">重置房間，再戰一局</button>
                ) : (
                  <p className="text-slate-400 font-bold animate-pulse">等待老師重置遊戲...</p>
                )}
              </div>
            </div>
          );

          // 遊戲主畫面 (playing / gacha)
          const q = roomData.questions[roomData.qIndex];
          const team = myRole === 'host' ? null : roomData.teams[myRole];
          const buzzIsOpen = timeToOpen === 0;

          return (
            <div className="h-full flex flex-col font-sans overflow-hidden bg-black/55">
              <ErrorModal />

              {/* ── 技能發動全域遮罩（遮住題目，所有人可見） ── */}
              {roomData.cardOverlay && (() => {
                const ov = roomData.cardOverlay;
                const isTarget = myRole !== 'host' && myRole === ov.targetGroup;
                const isPlayer = myRole !== 'host' && myRole === ov.playerGroup;
                const playerTeam = roomData.teams[ov.playerGroup];
                const targetTeam = ov.targetGroup ? roomData.teams[ov.targetGroup] : null;
                return (
                  <div className={`fixed inset-0 z-[80] flex flex-col items-center justify-center safe-overlay animate-fade-in overflow-y-auto
                    ${isTarget ? 'bg-red-950' : 'bg-slate-950'}`}
                    style={{ backgroundColor: isTarget ? 'rgba(60,0,0,0.97)' : 'rgba(2,6,23,0.97)',
                             border: isTarget ? '4px solid #ef4444' : '4px solid #334155',
                             WebkitOverflowScrolling: 'touch' }}>

                  {/* 被攻擊者專屬：大字提示 */}
                  {isTarget && (
                    <div className="mb-4 text-center">
                      <div className="text-6xl mb-2" style={{animation:'bounce 0.6s infinite'}}>⚔️</div>
                      <p className="text-red-400 text-3xl font-black">你被攻擊了！</p>
                      {ov.targetDelta !== null && ov.targetDelta !== undefined && (
                        <p className="text-red-300 text-5xl font-black mt-2">{ov.targetDelta} 分</p>
                      )}
                    </div>
                  )}

                  {/* 旁觀者：大字提示 */}
                  {!isTarget && !isPlayer && (
                    <div className="mb-4 text-center">
                      <div className="text-5xl mb-2">⚡</div>
                      <p className={`text-2xl font-black ${playerTeam?.yuan?.text || 'text-white'}`}>{ov.yuanName}</p>
                      <p className="text-slate-300 text-lg font-bold mt-1">正在發動技能中...</p>
                      <p className="text-slate-500 text-xs mt-1">時間暫停，請稍候</p>
                    </div>
                  )}

                  {/* 發動者資訊（被攻擊者 / 發動者自己 用的小標） */}
                  {(isTarget || isPlayer) && (
                    <p className="text-slate-400 text-sm mb-0.5">⚡ 技能發動！</p>
                  )}
                  {(isTarget || isPlayer) && (
                    <p className={`text-xl font-black mb-3 ${playerTeam?.yuan?.text || 'text-white'}`}>
                      {ov.yuanName}
                    </p>
                  )}

                  {/* 卡牌框 */}
                  <div className="rounded-2xl p-4 text-center w-full max-w-xs mb-3"
                    style={{ background: 'rgba(234,179,8,0.12)', border: '2px solid rgba(234,179,8,0.7)' }}>
                    <p className="text-yellow-400 text-xs font-bold mb-1">技能卡</p>
                    <p className="text-xl font-black text-white mb-2">【{ov.cardName}】</p>
                    <p className="text-sm text-slate-300 leading-relaxed">{ov.cardDesc}</p>
                  </div>

                  {/* 目標 */}
                  {targetTeam && !isTarget && (
                    <div className="flex items-center gap-2 px-4 py-2 rounded-xl mb-2"
                      style={{ background: 'rgba(51,65,85,0.8)' }}>
                      <span className="text-slate-400 text-xs">攻擊目標：</span>
                      <span className={`font-black text-base ${targetTeam.yuan?.text}`}>{ov.targetYuanName}</span>
                      {ov.targetDelta !== null && ov.targetDelta !== undefined && (
                        <span className="text-red-400 font-black">{ov.targetDelta} 分</span>
                      )}
                    </div>
                  )}

                  {isPlayer && <p className="text-slate-500 text-xs mt-1">技能效果將在 5 秒後結束</p>}
                  <p className="text-slate-600 text-xs text-center max-w-xs mt-1">{ov.log}</p>
                  </div>
                );
              })()}

              {/* ── 選擇攻擊目標全域遮罩（fixed，不受 overflow-hidden 影響） ── */}
              {pendingCard && myRole !== 'host' && (
                <div className="fixed inset-0 z-[70] flex flex-col items-center justify-center safe-overlay animate-fade-in overflow-y-auto"
                  style={{ background: 'rgba(10,15,35,0.97)', WebkitOverflowScrolling: 'touch' }}>
                  <div className="w-full max-w-xs my-auto">
                    <p className="text-slate-400 text-sm text-center mb-2">⚡ 準備發動技能</p>
                    <div className="rounded-2xl p-4 text-center mb-5"
                      style={{ background: 'rgba(234,179,8,0.15)', border: '2px solid rgba(234,179,8,0.7)' }}>
                      <p className="text-yellow-300 font-black text-lg">【{pendingCard.name}】</p>
                      <p className="text-slate-300 text-xs mt-1 leading-relaxed">{pendingCard.desc}</p>
                    </div>
                    <p className="text-rose-300 text-sm font-black text-center mb-3">⚔️ 選擇攻擊目標</p>
                    <div className="grid grid-cols-2 gap-3">
                      {Object.values(roomData.teams)
                        .filter(t => t.joined && t.id !== myRole && (roomData.scores?.[t.id] ?? 100) > 0)
                        .map(t => (
                          <button key={t.id} onClick={() => playCard(pendingCard, t.id)}
                            className={`py-5 rounded-2xl text-white font-black active:scale-95 transition shadow-lg ${t.yuan?.color}`}>
                            <span className="block text-base">{t.yuan?.name}</span>
                            <span className="block text-xs font-normal mt-0.5 opacity-80">{roomData.scores?.[t.id] ?? 0} 分</span>
                          </button>
                        ))}
                    </div>
                    <button onClick={() => setPendingCard(null)}
                      className="mt-4 w-full text-slate-400 text-sm py-3 rounded-xl border border-slate-700 active:opacity-70">
                      取消
                    </button>
                  </div>
                </div>
              )}

              {/* 老師斷線時 useEffect 會自動把 state 改成 end，不需要 banner */}
              <header className="bg-slate-800 border-b border-slate-700 shadow-md">
                <div className="p-3 flex justify-between items-center">
                  <span className="font-bold text-sm">房 {roomCode}</span>
                  <div className="flex items-center gap-2">
                    {roomData.state === 'playing' && !roomData.buzzerWinner && timeToOpen > 0 && (
                      <span className="bg-amber-500 text-black px-2 py-0.5 rounded-full text-xs font-black">{timeToOpen}s</span>
                    )}
                    {roomData.state === 'playing' && !roomData.buzzerWinner && timeToOpen === 0 && (
                      <span className="bg-emerald-500 text-white px-2 py-0.5 rounded-full text-xs font-black animate-pulse">搶答中</span>
                    )}
                    {roomData.buzzerWinner && answerTimeLeft !== null && (
                      <span className={`px-2 py-0.5 rounded-full text-xs font-black ${answerTimeLeft <= 3 ? 'bg-rose-500 text-white animate-pulse' : 'bg-slate-600 text-white'}`}>
                        ⏱ {answerTimeLeft}s
                      </span>
                    )}
                    <span className="bg-slate-700 px-3 py-1 rounded-full text-xs">第 {roomData.qIndex + 1} 題</span>
                  {myRole === 'host' && roomData.state === 'playing' && (
                    <button onClick={nextQ} className="bg-slate-600 hover:bg-slate-500 text-white px-3 py-1 rounded-full text-xs font-bold active:scale-95 transition">跳過</button>
                  )}
                  {myRole === 'host' && (
                    <button onClick={() => setShowScoreboard(s => !s)}
                      className={`px-3 py-1 rounded-full text-xs font-bold active:scale-95 transition ${showScoreboard ? 'bg-yellow-500 text-black' : 'bg-slate-600 text-white'}`}>
                      {showScoreboard ? '遊戲' : '排行'}
                    </button>
                  )}
                  </div>
                </div>
                {/* 答題倒數進度條 */}
                {roomData.buzzerWinner && answerTimeLeft !== null && (
                  <div className="h-1 bg-slate-700 mx-3 mb-2 rounded-full overflow-hidden">
                    <div className={`h-full transition-all duration-300 ${answerTimeLeft <= 3 ? 'bg-rose-500' : 'bg-amber-400'}`}
                      style={{ width: `${(answerTimeLeft / ANSWER_TIME_LIMIT) * 100}%` }} />
                  </div>
                )}
              </header>
              {myRole === 'host' && showScoreboard ? (
                <div className="flex-1 overflow-auto p-4 flex flex-col gap-3">
                  <h2 className="text-lg font-black text-center text-yellow-400 shrink-0">即時分數排行</h2>
                  {Object.values(roomData.teams)
                    .sort((a, b) => (roomData.scores?.[b.id] ?? 0) - (roomData.scores?.[a.id] ?? 0))
                    .map((t, idx) => {
                      const score = roomData.scores?.[t.id] ?? 0;
                      return (
                        <div key={t.id} className="relative bg-slate-800 rounded-2xl overflow-hidden flex items-center px-5 py-5 gap-4 border-2 border-slate-700 shrink-0">
                          <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className={`yuan-bar ${t.yuan?.color}`} style={{ width: `${Math.min(100, score)}%` }} />
                          </div>
                          <span className="relative text-2xl w-10 text-center shrink-0">
                            {idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `#${idx+1}`}
                          </span>
                          <div className="relative flex-1">
                            <p className={`text-2xl font-black ${t.yuan?.text}`}>{t.yuan?.name}</p>
                            <p className="text-xs text-slate-400">{t.name}</p>
                          </div>
                          <span className={`relative text-4xl font-black ${score > 0 ? 'text-white' : 'text-slate-600'}`}>
                            {score}<span className="text-sm text-slate-400 ml-1">分</span>
                          </span>
                        </div>
                      );
                    })}
                </div>
              ) : (
              <main className="flex-1 flex flex-col p-3 gap-3 overflow-hidden">
                {/* HP 看板 */}
                <div className="shrink-0 flex flex-col gap-1.5">
                  {/* 我的分數大顯示（學生專屬）*/}
                  {myRole !== 'host' && team && (() => {
                    const myScore = roomData.scores?.[myRole] ?? 0;
                    const isBuzz = roomData.buzzerWinner === myRole;
                    const isWrong = (roomData.wrongAnswerers || []).includes(myRole);
                    const borderClass = team.yuan?.color?.replace('bg-', 'border-') || 'border-slate-600';
                    const fx = roomData.statusEffects?.[myRole] || {};
                    return (
                      <div className={`relative rounded-xl border-2 overflow-hidden flex items-center px-3 py-2 gap-3 h-12
                        ${isBuzz ? 'border-yellow-400 bg-white' : `${borderClass} bg-slate-800`}
                        ${myScore <= 0 ? 'opacity-40' : ''}`}>
                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                          <div className={`yuan-bar ${team.yuan?.color}`} style={{ width: `${Math.min(100, myScore)}%` }} />
                        </div>
                        <span className="relative text-[10px] font-bold text-slate-400 shrink-0">我的</span>
                        <span className={`relative text-sm font-black shrink-0 ${isBuzz ? team.yuan?.text : 'text-white'}`}>{team.yuan?.name}</span>
                        {fx.shielded && <span className="relative text-[10px] bg-blue-500/30 text-blue-300 px-1 rounded shrink-0">🛡護</span>}
                        {fx.doublePoints && <span className="relative text-[10px] bg-yellow-500/30 text-yellow-300 px-1 rounded shrink-0">×2</span>}
                        {fx.priorityBuzz && <span className="relative text-[10px] bg-emerald-500/30 text-emerald-300 px-1 rounded shrink-0">優先</span>}
                        <div className="relative flex-1 text-right">
                          <span className={`text-2xl font-black ${isBuzz ? 'text-black' : myScore <= 20 ? 'text-rose-400' : 'text-white'}`}>{myScore}</span>
                          <span className="text-xs text-slate-400 ml-1">分</span>
                        </div>
                        {isWrong && myScore > 0 && <span className="relative text-[10px] text-rose-400 font-bold shrink-0">已答題</span>}
                        {myScore <= 0 && <span className="relative text-[10px] text-slate-500 font-bold shrink-0">已淘汰</span>}
                      </div>
                    );
                  })()}
                  {/* 全體迷你分數 */}
                  <div className="grid grid-cols-5 gap-1.5 h-14">
                    {Object.values(roomData.teams).map(t => {
                      const score = roomData.scores?.[t.id] ?? 0;
                      const buzz = roomData.buzzerWinner === t.id;
                      const wronged = (roomData.wrongAnswerers || []).includes(t.id);
                      const isMe = t.id === myRole;
                      return (
                        <div key={t.id} className={`relative rounded-xl border-2 transition-all flex flex-col justify-center items-center overflow-hidden
                          ${buzz ? 'border-yellow-400 bg-white z-10' : wronged ? 'border-rose-800 bg-slate-800' : isMe ? `${t.yuan?.color?.replace('bg-', 'border-')} bg-slate-800` : 'bg-slate-800 border-slate-700'}
                          ${score <= 0 ? 'opacity-30 grayscale' : ''}`}>
                          <div className="absolute inset-0 opacity-20 pointer-events-none">
                            <div className={`yuan-bar ${t.yuan?.color}`} style={{ width: `${Math.min(100, score)}%` }}></div>
                          </div>
                          <p className="text-[8px] font-bold text-slate-500">{t.name}</p>
                          <p className={`text-[10px] sm:text-sm font-black ${buzz ? t.yuan?.text : 'text-white'}`}>{t.yuan?.name}</p>
                          <p className={`text-[10px] font-black ${buzz ? 'text-black' : 'text-slate-300'}`}>{score}分</p>
                          {wronged && score > 0 && <p className="text-[8px] text-rose-400 font-bold">已答</p>}
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* 題目區（可滾動，避免小螢幕內容被截斷） */}
                <div className={`flex-1 bg-slate-800 p-4 rounded-2xl border-4 flex flex-col gap-3 overflow-y-auto min-h-0
                  ${roomData.buzzerWinner ? 'border-yellow-400' : buzzIsOpen && roomData.state === 'playing' ? 'border-emerald-600' : 'border-slate-700'}`}
                  style={{ WebkitOverflowScrolling: 'touch' }}>
                  <h2 className="text-xl sm:text-2xl font-black mobile-q-text shrink-0">{q.text}</h2>
                  <div className="flex flex-col gap-2.5">
                    {q.options.map((o, i) => (
                      <button key={i} onClick={() => handleAnswer(i)} disabled={myRole !== roomData.buzzerWinner}
                        className={`p-4 sm:p-5 rounded-xl border-2 text-left text-lg font-bold mobile-btn transition
                          ${myRole === roomData.buzzerWinner ? 'bg-slate-100 text-black border-white active:scale-95' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>
                        <span className="inline-block w-7 h-7 rounded-full bg-black/10 text-center leading-7 mr-3 text-sm font-black shrink-0">{['A', 'B', 'C'][i]}</span>
                        {o}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 搶答／技能卡區域 —— 固定高度，避免倒數/卡片/搶答按鈕切換時題目跳動 */}
                {myRole !== 'host' && (
                  <div className="shrink-0 overflow-y-auto transition-all duration-300"
                    style={{
                      height: roomData.state === 'playing' && !roomData.buzzerWinner ? '34vh' : '0px',
                      opacity: roomData.state === 'playing' && !roomData.buzzerWinner ? 1 : 0,
                      WebkitOverflowScrolling: 'touch'
                    }}>
                    {roomData.state === 'playing' && !roomData.buzzerWinner && renderBuzzerArea(team)}
                  </div>
                )}

                {/* 戰況 log */}
                <div className="h-20 bg-black/60 p-3 rounded-xl border-2 border-slate-700 font-mono text-[10px] overflow-hidden flex flex-col-reverse shrink-0">
                  {roomData.actionLog.map((l, i) => <div key={i} className={i === 0 ? 'text-white font-bold' : 'text-slate-500'}>{l}</div>)}
                </div>
              </main>
              )}

              {/* 手牌總覽浮層（Host 可查看各組卡牌，學生不顯示他人手牌）*/}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
