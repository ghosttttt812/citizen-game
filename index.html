        // ── 音效系統（Web Audio API，不需外部檔案）──────────────
        const sound = (() => {
          let ctx = null;
          const get = () => {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            return ctx;
          };
          const play = (freq, type, dur, freqEnd) => {
            try {
              const c = get();
              const osc = c.createOscillator();
              const gain = c.createGain();
              osc.connect(gain);
              gain.connect(c.destination);
              osc.type = type;
              osc.frequency.setValueAtTime(freq, c.currentTime);
              if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, c.currentTime + dur);
              gain.gain.setValueAtTime(0.3, c.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
              osc.start(c.currentTime);
              osc.stop(c.currentTime + dur);
            } catch (e) {}
          };
          return {
            // 倒數 tick（每秒一聲）
            tick: () => play(660, 'sine', 0.12),
            // 搶答開放（上揚音）
            go: () => {
              play(880, 'sine', 0.15);
              setTimeout(() => play(1047, 'sine', 0.25), 100);
            },
            // 有人搶答
            buzz: () => play(440, 'square', 0.12),
            // 答對（三音上揚）
            correct: () => {
              play(523, 'sine', 0.2);
              setTimeout(() => play(659, 'sine', 0.2), 150);
              setTimeout(() => play(784, 'sine', 0.4), 300);
            },
            // 答錯（下降音）
            wrong: () => play(280, 'sawtooth', 0.4, 160),
            // 遊戲開始倒數（低沉）
            syncTick: () => play(330, 'sine', 0.18),
            // 攻擊卡發動
            attack: () => play(160, 'sawtooth', 0.35, 100),
            // 抽卡
            draw: () => {
              play(330, 'triangle', 0.1);
              setTimeout(() => play(440, 'triangle', 0.1), 80);
              setTimeout(() => play(550, 'triangle', 0.25), 160);
            },
            // 遊戲結束（四音上揚）
            victory: () => {
              play(523, 'sine', 0.2);
              setTimeout(() => play(659, 'sine', 0.2), 220);
              setTimeout(() => play(784, 'sine', 0.2), 440);
              setTimeout(() => play(1047, 'sine', 0.5), 660);
            },
          };
        })();
    </script>

    <!-- ── 背景音樂控制器 ──────────────────────────────────── -->
    <script>
      const bgm = (() => {
        // 用 encodeURI 處理空白與特殊字元；附 error / canplaythrough log 方便偵錯
        const lobby = new Audio(encodeURI('Last Cappuccino in Rio - Chris Haugen.mp3'));
        const game  = new Audio(encodeURI('Helios - Jeremy Black.mp3'));
        lobby.preload = 'auto';  game.preload = 'auto';
        // 若主要檔案失敗 fallback 回原本檔
        lobby.addEventListener('error', () => { lobby.src = 'bgm_lobby.mp3'; });
        game.addEventListener('error',  () => { game.src  = 'bgm_game.mp3'; });
        lobby.loop = true;  lobby.volume = 0.35;
        game.loop  = true;  game.volume  = 0.40;

        let active   = null;
        let unlocked = false;
        let pending  = 'lobby';   // 使用者互動前暫存

        const _switch = (next) => {
          if (active === next) return;
          // 淡出舊曲
          if (active) {
            const old = active;
            const fade = setInterval(() => {
              if (old.volume > 0.03) { old.volume = Math.max(0, old.volume - 0.03); }
              else { old.pause(); old.currentTime = 0; old.volume = old === lobby ? 0.35 : 0.40; clearInterval(fade); }
            }, 40);
          }
          // 淡入新曲
          next.volume = 0;
          next.play().catch(() => {});
          const fadeIn = setInterval(() => {
            const target = next === lobby ? 0.35 : 0.40;
            if (next.volume < target - 0.03) { next.volume = Math.min(target, next.volume + 0.03); }
            else { next.volume = target; clearInterval(fadeIn); }
          }, 40);
          active = next;
        };

        const unlock = () => {
          if (unlocked) return;
          unlocked = true;
          _switch(pending === 'game' ? game : lobby);
        };

        // 第一次觸碰即解鎖（瀏覽器 autoplay 政策）
        document.addEventListener('click',      unlock, { once: true });
        document.addEventListener('touchstart', unlock, { once: true });

        return {
          toLobby: () => { pending = 'lobby'; if (unlocked) _switch(lobby); },
          toGame:  () => { pending = 'game';  if (unlocked) _switch(game);  },
        };
      })();
    </script>

        const RULES_COMMON_CARDS = [
          { id:'c01', name:'甲級動員', desc:'下一回合本組享有絕對優先搶答權，不需比手速。若答錯則開放其他組搶答。', tag:'搶答優勢', tagColor:'bg-emerald-100 text-emerald-700', emoji:'⚡' },

          { id:'c07', name:'民意支持', desc:'護身符！可保留在手中。當遭受任何扣分攻擊時立即打出，完全抵銷該次攻擊。', tag:'完全防禦', tagColor:'bg-cyan-100 text-cyan-700', emoji:'🛡️' },
          { id:'c08', name:'朝野協商', desc:'指定另一組強行結盟。下一回合只要對方答題得分，本組免費獲得一半的分數。', tag:'結盟收益', tagColor:'bg-teal-100 text-teal-700', emoji:'🤜🤛' },

        // 共同卡完整說明（CardRule.txt 原文）
        const COMMON_CARD_FULL_DESC = {
          c01: '發動後，下一回合的題目，該組擁有「絕對優先搶答權」（不需比拼手速）。若答錯，則開放其他組搶答。',

          c07: '這是一張「護身符」，可蓋牌保留在手中。當遭受任何扣分攻擊（包含五院專屬技能或其他卡牌）時可立即翻開，完全「抵銷該次攻擊」。',
          c08: '指定另一組強行結盟。在「下一回合」中，只要該組答題得分，發動此卡的組別也能「免費獲得一半的分數」。',
          c09: '全場五個組別必須將目前所有分數，全部統一往左邊傳交給下一組。',
          c10: '國庫撥款！發動後，場上所有組別（包含自己）立刻各加 10 分。作為代價，發動此卡的組別可以在牌堆中免費「抽 1 張」新的共同卡。',
        };

        // QUESTION_BANK 來自外部 questions.js

        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        const GROUP_IDS = ['group1','group2','group3','group4','group5'];

        // 院長資料集中在這裡：未來換人時，只要更新 leader、img、distractors。
        const YUAN_LEADERS = [
          { yuanId:'executive',   yuan:'行政院', emoji:'🏛️', leader:'卓榮泰', img:'images/leaders/行政院院長-卓榮泰.jpg',   distractors:['蘇貞昌', '陳建仁', '賴清德'] },
          { yuanId:'legislative', yuan:'立法院', emoji:'🏢', leader:'韓國瑜', img:'images/leaders/立法院院長-韓國瑜.jpg', distractors:['游錫堃', '王金平', '蘇嘉全'] },
          { yuanId:'judicial',    yuan:'司法院', emoji:'⚖️', leader:'謝銘洋', img:'images/leaders/司法院院長-謝銘洋.jpg',    distractors:['許宗力', '賴英照', '翁岳生'] },
          { yuanId:'control',     yuan:'監察院', emoji:'🔍', leader:'李鴻鈞', img:'images/leaders/監察院院長-李鴻鈞.jpg',     distractors:['陳菊', '張博雅', '王建煊'] },
          { yuanId:'examination', yuan:'考試院', emoji:'📚', leader:'周弘憲', img:'images/leaders/考試院院長-周弘憲_2.jpg', distractors:['黃榮村', '伍錦霖', '關中'] },
        ];

        // ── 突發事件題庫（隨機從五院挑一題：誰是該院院長）
        const SURPRISE_EVENTS = YUAN_LEADERS.map(l => ({
          yuanId: l.yuanId,
          yuan: l.yuan,
          img: l.img,
          emoji: l.emoji,
          text: `誰是現任${l.yuan}院長？`,
          options: [l.leader, ...l.distractors],
          answer: 0,
        }));
        // 兩種題型隨機：
        //   name   — 「誰是 X院 的院長？」    選項是人名
        //   yuan   — 「這是哪個院的院長？」  選項是院名（不顯示「關於 X院」標題）
        const buildSurpriseEvent = () => {
          const t = SURPRISE_EVENTS[Math.floor(Math.random() * SURPRISE_EVENTS.length)];
          const variant = Math.random() < 0.5 ? 'name' : 'yuan';
          if (variant === 'name') {
            const correctOption = t.options[t.answer];
            const shuffled = shuffle(t.options);
            return { yuanId:t.yuanId, yuan:t.yuan, img:t.img, emoji:t.emoji, text:t.text,
                     options:shuffled, answer:shuffled.indexOf(correctOption), variant };
          }
          // variant === 'yuan'
          const allYuans = SURPRISE_EVENTS.map(e => e.yuan);
          const distractors = shuffle(allYuans.filter(y => y !== t.yuan)).slice(0, 3);
          const options = shuffle([t.yuan, ...distractors]);
          return { yuanId:t.yuanId, yuan:t.yuan, img:t.img, emoji:t.emoji,
                   text:'這是哪個院的院長？', options, answer:options.indexOf(t.yuan), variant };
        };

        const CORRECT_POINTS = 40;      // 答對得分
        const WRONG_PENALTY  = 15;      // 答錯扣分
        const BUZZ_DELAY_NEW_Q = 5;    // 新題目搶答延遲秒數（技能發動窗口）
        const BUZZ_DELAY_RETRY = 1;    // 答錯後換人搶答延遲
        const ANSWER_TIME_LIMIT = 15;  // 答題時間上限（秒）
        const SURPRISE_TIME_LIMIT = 15; // 突發事件作答時間（秒）
        const SURPRISE_POINTS = 80;     // 突發事件答對得分（雙倍）

        const createStatusEffects = () => GROUP_IDS.reduce((acc, gid) => {
          acc[gid] = { cardBanned: false, priorityBuzz: false, shielded: false, doublePoints: false };
          return acc;
        }, {});

        const clonePlain = (value, fallback = {}) => JSON.parse(JSON.stringify(value ?? fallback));

        const joinedGroupIds = (teams = {}) =>
          Object.values(teams).filter(t => t.joined).map(t => t.id);

        const clearRoundStatusEffects = (statusEffects = {}) => {
          const next = clonePlain(statusEffects);
          Object.keys(next).forEach(gid => {
            next[gid].cardBanned = false;
            next[gid].mustPayExam = false;
            next[gid].shielded = false;
          });
          return next;
        };

        const applyExamPayment = (data, role, scoresIn) => {
          const newScores = { ...(scoresIn || {}) };
          const mustPay = data.statusEffects?.[role]?.mustPayExam;
          if (!mustPay) return { newScores, paid: false, examGroupId: null };
          const examTeam = Object.values(data.teams || {}).find(t => t.yuan?.id === 'examination' && t.joined);
          if (!examTeam || examTeam.id === role) return { newScores, paid: false, examGroupId: null };
          newScores[role] = Math.max(0, (newScores[role] || 0) - 10);
          newScores[examTeam.id] = (newScores[examTeam.id] || 0) + 10;
          return { newScores, paid: true, examGroupId: examTeam.id, examYuan: examTeam.yuan?.name };
        };

        const buildWrongAnswerUpdate = (data, role, reason, now) => {
          const yuanName = data.teams?.[role]?.yuan?.name || '本組';
          const pay = applyExamPayment(data, role, data.scores || {});
          const payLog = pay.paid ? `（先繳 10 分給 ${pay.examYuan}）` : '';
          const newScores = { ...pay.newScores, [role]: Math.max(0, (pay.newScores[role] || 0) - WRONG_PENALTY) };
          const wrongSet = new Set(data.wrongAnswerers || []);
          wrongSet.add(role);
          const newWrong = Array.from(wrongSet);
          const remaining = joinedGroupIds(data.teams).filter(k => newScores[k] > 0 && !newWrong.includes(k));

          if (remaining.length === 0) {
            return {
              shouldAdvance: true,
              updates: {
                scores: newScores,
                buzzerWinner: null,
                wrongAnswerers: [],
                answerDeadline: null,
                actionLog: [`❌ ${yuanName} ${reason}！全員作答完畢，跳過本題${payLog}`, ...(data.actionLog || [])].slice(0, 5)
              }
            };
          }

          return {
            shouldAdvance: false,
            updates: {
              scores: newScores,
              buzzerWinner: null,
              answerDeadline: null,
              wrongAnswerers: newWrong,
              buzzerOpenAt: now + BUZZ_DELAY_RETRY * 1000,
              actionLog: [`❌ ${yuanName} ${reason}！換人搶答 (-${WRONG_PENALTY} 分)${payLog}`, ...(data.actionLog || [])].slice(0, 5)
            }
          };
        };

        const buildNextQuestionUpdate = (data, now, surpriseEvent) => {
          const newStatus = clearRoundStatusEffects(data.statusEffects || {});
          const shouldTriggerSurprise = !data.surpriseTriggered
            && typeof data.surpriseAfter === 'number'
            && data.qIndex === data.surpriseAfter;

          if (shouldTriggerSurprise) {
            return {
              state: 'surprise',
              surpriseTriggered: true,
              surpriseEvent: { ...surpriseEvent, answers: {}, deadline: now + SURPRISE_TIME_LIMIT * 1000 },
              buzzerWinner: null,
              buzzerOpenAt: 0,
              answerDeadline: null,
              wrongAnswerers: [],
              statusEffects: newStatus,
              cardOverlay: null,
              actionLog: [`🚨 突發事件！全員作答（答對 +${SURPRISE_POINTS} / 答錯 -${WRONG_PENALTY}）`, ...(data.actionLog || [])].slice(0, 5),
            };
          }

          return data.qIndex + 1 < (data.questions || []).length
            ? {
                qIndex: data.qIndex + 1,
                buzzerWinner: null,
                state: 'playing',
                buzzerOpenAt: now + BUZZ_DELAY_NEW_Q * 1000,
                answerDeadline: null,
                wrongAnswerers: [],
                statusEffects: newStatus,
                cardOverlay: null,
              }
            : { state: 'end', cardOverlay: null };
        };

        function App() {
          const [user, setUser] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [roomCode, setRoomCode] = useState('');
          const [roomData, setRoomData] = useState(null);
          const [myRole, setMyRole] = useState(null);
          const [joinInput, setJoinInput] = useState('');
          const [errorMsg, setErrorMsg] = useState('');
          const [syncCountdown, setSyncCountdown] = useState(null);
          const [timeToOpen, setTimeToOpen] = useState(null);       // 搶答開放倒數
          const [answerTimeLeft, setAnswerTimeLeft] = useState(null); // 答題剩餘秒數
          const [showScoreboard, setShowScoreboard] = useState(false);
          const [pendingCard, setPendingCard] = useState(null);
          const [pendingGroup, setPendingGroup] = useState(null);
          const [cardRevealed, setCardRevealed] = useState(false);
          const [showRules, setShowRules] = useState(false);
          const [rulesTab, setRulesTab] = useState(0);
          const [flippedCards, setFlippedCards] = useState({});
          const [feedbackOverlay, setFeedbackOverlay] = useState(null);
          const [surpriseTimeLeft, setSurpriseTimeLeft] = useState(null);
          // 本機立即視覺：自己剛剛選了哪題答案、正不正確（不必等 Firestore 回來）
          const [localAnswerResult, setLocalAnswerResult] = useState(null);  // {idx, isCorrect, scope:'regular'|'surprise'}
          const feedbackTimer = useRef(null);
          const surpriseResolving = useRef(false);
          const prevSurpriseResolvedAt = useRef(null);
          const localAnswerTimer = useRef(null);

          // 模組化：統一顯示「答對 / 答錯」通知（正常題 & 突發事件共用，自己 / 他人都會看到）
          const showAnswerFeedback = (type, yuanName, yuanText, points, duration) => {
            if (feedbackTimer.current) clearTimeout(feedbackTimer.current);
            setFeedbackOverlay({ type, yuan: yuanName, yuanText, points });
            feedbackTimer.current = setTimeout(() => {
              setFeedbackOverlay(null);
              feedbackTimer.current = null;
            }, duration || (type === 'correct' ? 1800 : 1600));
          };

          // 自己剛剛點下答案的瞬間立刻標記（不等 Firestore 回來），同時觸發 overlay
          const markLocalAnswer = (idx, isCorrect, scope, yuanName, yuanText, points) => {
            if (localAnswerTimer.current) clearTimeout(localAnswerTimer.current);
            setLocalAnswerResult({ idx, isCorrect, scope });
            showAnswerFeedback(isCorrect ? 'correct' : 'wrong', yuanName, yuanText, points);
            localAnswerTimer.current = setTimeout(() => {
              setLocalAnswerResult(null);
              localAnswerTimer.current = null;
            }, 1900);
          };

          const prevBuzzerWinner = useRef(null);
          const prevState = useRef(null);
          const prevWrongLen = useRef(0);
          const prevTimeToOpen = useRef(null);
          const prevSyncCountdown = useRef(null);
          const prevLastRoundWinner = useRef(null);
          const timeoutFired = useRef(false);

          const showError = (msg) => setErrorMsg(msg);

          const ErrorModal = () => {
            if (!errorMsg) return null;
            return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 animate-fade-in" style={{ background:'rgba(60,50,35,0.55)' }}>
                <div className="app-card-3 border-4 border-rose-400 p-8 rounded-3xl max-w-sm w-full text-center app-shadow">
                  <div className="text-5xl mb-4">⚠️</div>
                  <h3 className="text-2xl font-black app-text mb-3">系統提示</h3>
                  <p className="app-text-2 font-medium mb-8 whitespace-pre-wrap leading-relaxed">{errorMsg}</p>
                  <button onClick={() => setErrorMsg('')} className="w-full bg-rose-400 text-white font-black text-lg py-4 rounded-xl active:scale-95 transition">
                    我知道了
                  </button>
                </div>
              </div>
            );
          };

          // Firebase Auth
          useEffect(() => {
            auth.signInAnonymously().catch(() => showError("連線至伺服器失敗，請重新整理網頁。"));
            const unsubscribe = auth.onAuthStateChanged((u) => {
              setUser(u);
              setIsConnecting(false);
            });
            return () => unsubscribe();
          }, []);

          // 監聽房間資料
          useEffect(() => {
            if (!user || !roomCode) return;
            const unsubscribe = db.collection('rooms_v2').doc(roomCode).onSnapshot(
              (doc) => {
                if (doc.exists) {
                  const data = doc.data();
                  setRoomData(data);
                  if (data.state === 'countdown' && data.startTime) {
                    const diff = Math.ceil((data.startTime - Date.now()) / 1000);
                    setSyncCountdown(diff > 0 ? diff : 0);
                  } else {
                    setSyncCountdown(null);
                  }
                } else {
                  showError("房間不存在或已由房主關閉！");
                  setRoomCode(''); setMyRole(null);
                }
              },
              () => showError("資料同步中斷，請確認網路連線！")
            );
            return () => unsubscribe();
          }, [user, roomCode]);

          // 同步倒數計時
          useEffect(() => {
            if (syncCountdown !== null && syncCountdown > 0) {
              const timer = setTimeout(() => setSyncCountdown(syncCountdown - 1), 1000);
              return () => clearTimeout(timer);
            } else if (syncCountdown === 0 && myRole === 'host') {
              runRoomTransaction((data) => {
                if (data.state !== 'countdown') return null;
                return {
                  updates: {
                    state: 'playing',
                    buzzerOpenAt: Date.now() + BUZZ_DELAY_NEW_Q * 1000,
                    wrongAnswerers: []
                  }
                };
              }).catch(() => {});
            }
          }, [syncCountdown]);

          // 搶答開放倒數（本地計算）
          useEffect(() => {
            if (!roomData || roomData.state !== 'playing' || !roomData.buzzerOpenAt) {
              setTimeToOpen(null);
              return;
            }
            const update = () => {
              const remaining = Math.ceil((roomData.buzzerOpenAt - Date.now()) / 1000);
              setTimeToOpen(Math.max(0, remaining));
            };
            update();
            const interval = setInterval(update, 200);
            return () => clearInterval(interval);
          }, [roomData?.buzzerOpenAt, roomData?.state]);

          // 答題倒數（本地計算）
          useEffect(() => {
            if (!roomData || !roomData.buzzerWinner || !roomData.answerDeadline || roomData.state !== 'playing') {
              setAnswerTimeLeft(null);
              timeoutFired.current = false;
              return;
            }
            const update = () => {
              const remaining = Math.ceil((roomData.answerDeadline - Date.now()) / 1000);
              setAnswerTimeLeft(Math.max(0, remaining));
            };
            update();
            const interval = setInterval(update, 200);
            return () => clearInterval(interval);
          }, [roomData?.answerDeadline, roomData?.buzzerWinner, roomData?.state]);

          // 答題超時處理（只由 buzzerWinner 的客戶端觸發）
          useEffect(() => {
            if (answerTimeLeft !== 0 || timeoutFired.current) return;
            if (!roomData || myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            timeoutFired.current = true;
            handleTimeout();
          }, [answerTimeLeft]);

          // 音效 + 答對/答錯動畫：正常題目用
          useEffect(() => {
            if (!roomData) return;
            if (roomData.buzzerWinner && roomData.buzzerWinner !== prevBuzzerWinner.current) sound.buzz();
            prevBuzzerWinner.current = roomData.buzzerWinner;

            // 答對（正常題）
            if (roomData.lastRoundWinner && roomData.lastRoundWinner !== prevLastRoundWinner.current) {
              sound.correct();
              const team = roomData.teams[roomData.lastRoundWinner];
              showAnswerFeedback('correct', team?.yuan?.name, team?.yuan?.text, roomData.lastRoundPoints || CORRECT_POINTS);
            }
            prevLastRoundWinner.current = roomData.lastRoundWinner;

            if (roomData.state === 'end' && prevState.current !== 'end') sound.victory();
            prevState.current = roomData.state;

            // 答錯（正常題）
            const currWrongLen = (roomData.wrongAnswerers || []).length;
            if (currWrongLen > prevWrongLen.current) {
              sound.wrong();
              const lastWrongId = roomData.wrongAnswerers[currWrongLen - 1];
              const team = roomData.teams[lastWrongId];
              showAnswerFeedback('wrong', team?.yuan?.name, team?.yuan?.text, -WRONG_PENALTY);
            }
            prevWrongLen.current = currWrongLen;
          }, [roomData]);

          // 突發事件結算後，每個學生才看到自己組別的答對/答錯通知（避免提前洩題）
          useEffect(() => {
            const ev = roomData?.surpriseEvent;
            if (!ev?.resolved || !ev.results || myRole === 'host') return;
            if (ev.resolvedAt === prevSurpriseResolvedAt.current) return;
            prevSurpriseResolvedAt.current = ev.resolvedAt;
            const myResult = ev.results.find(r => r.yuanId === myRole);
            if (!myResult) return;
            if (myResult.resultType === 'correct') {
              sound.correct();
              showAnswerFeedback('correct', myResult.yuan, myResult.yuanText, SURPRISE_POINTS);
            } else if (myResult.resultType === 'wrong') {
              sound.wrong();
              showAnswerFeedback('wrong', myResult.yuan, myResult.yuanText, -WRONG_PENALTY);
            }
          }, [roomData?.surpriseEvent?.resolved, roomData?.surpriseEvent?.resolvedAt, myRole]);

          // 換題時清掉「本機剛選的答案」標記，避免殘留
          useEffect(() => {
            setLocalAnswerResult(null);
            if (localAnswerTimer.current) { clearTimeout(localAnswerTimer.current); localAnswerTimer.current = null; }
          }, [roomData?.qIndex, roomData?.state]);

          // BGM：依遊戲狀態切換
          useEffect(() => {
            if (!roomData || roomData.state === 'lobby' || roomData.state === 'countdown' || roomData.state === 'end') {
              bgm.toLobby();
            } else if (roomData.state === 'playing' || roomData.state === 'surprise') {
              bgm.toGame();
            }
          }, [roomData?.state]);

          // 心跳：每 25 秒寫入（供斷線偵測）
          useEffect(() => {
            if (!roomCode || !myRole) return;
            const write = () => db.collection('rooms_v2').doc(roomCode).update({
              [`heartbeats.${myRole}`]: Date.now()
            }).catch(() => {});
            write();
            const iv = setInterval(write, 25000);
            return () => clearInterval(iv);
          }, [roomCode, myRole]);

          // 老師斷線 → 自動結束遊戲（任一在線學生觸發，寫一次即可）
          useEffect(() => {
            if (!roomData || !roomCode || myRole === 'host') return;
            if (!['playing', 'countdown', 'surprise'].includes(roomData.state)) return;
            const hb = roomData.heartbeats?.host;
            if (!hb || hb === 0) return; // host 從未連過，不誤判
            if (Date.now() - hb > 60000) {
              runRoomTransaction((data) => {
                if (!['playing', 'countdown', 'surprise'].includes(data.state)) return null;
                const freshHb = data.heartbeats?.host;
                if (!freshHb || Date.now() - freshHb <= 60000) return null;
                return {
                  updates: {
                    state: 'end',
                    cardOverlay: null,
                    actionLog: ['💀 老師端斷線，遊戲強制結束！', ...(data.actionLog || [])].slice(0, 5)
                  }
                };
              }).catch(() => {});
            }
          }, [roomData]);

          // 突發事件本地倒數
          useEffect(() => {
            if (roomData?.state !== 'surprise' || !roomData?.surpriseEvent?.deadline) {
              setSurpriseTimeLeft(null);
              return;
            }
            const update = () => {
              const t = Math.ceil((roomData.surpriseEvent.deadline - Date.now()) / 1000);
              setSurpriseTimeLeft(Math.max(0, t));
            };
            update();
            const iv = setInterval(update, 200);
            return () => clearInterval(iv);
          }, [roomData?.surpriseEvent?.deadline, roomData?.state]);

          // 突發事件結算（host 監看：全員答完或時間到，結算後 3.5 秒進下一題）
          useEffect(() => {
            if (roomData?.state !== 'surprise' || !roomData?.surpriseEvent || myRole !== 'host') return;
            const check = () => {
              const ev = roomData.surpriseEvent;
              if (!ev) return;
              if (ev.resolved) {
                // 已結算，等 3.5s 後推進
                if (Date.now() > (ev.resolvedAt || 0) + 3500) advancePastSurprise();
                return;
              }
              const joinedIds = Object.values(roomData.teams).filter(t => t.joined).map(t => t.id);
              const answered = Object.keys(ev.answers || {});
              const allDone = joinedIds.length > 0 && joinedIds.every(id => answered.includes(id));
              const expired = Date.now() > ev.deadline;
              if (allDone || expired) resolveSurpriseEvent();
            };
            check();
            const iv = setInterval(check, 500);
            return () => clearInterval(iv);
          }, [roomData?.state, roomData?.surpriseEvent, myRole]);

          // 技能遮罩自動清除（由發動者的客戶端負責）
          useEffect(() => {
            if (!roomData?.cardOverlay || !roomCode) return;
            const { showUntil, remainingMs, playerGroup } = roomData.cardOverlay;
            if (playerGroup !== myRole) return;
            const delay = Math.max(0, showUntil - Date.now());
            const timer = setTimeout(() => {
              runRoomTransaction((data) => {
                const ov = data.cardOverlay;
                if (!ov || ov.playerGroup !== playerGroup || ov.showUntil !== showUntil) return null;
                return {
                  updates: {
                    cardOverlay: null,
                    buzzerOpenAt: Date.now() + Math.max(500, remainingMs),
                  }
                };
              }).catch(() => {});
            }, delay);
            return () => clearTimeout(timer);
          }, [roomData?.cardOverlay]);

          // 音效：遊戲開始同步倒數
          useEffect(() => {
            if (syncCountdown === null || syncCountdown === 0) return;
            if (syncCountdown !== prevSyncCountdown.current) sound.syncTick();
            prevSyncCountdown.current = syncCountdown;
          }, [syncCountdown]);

          // 音效：搶答倒數 tick 和開放音
          useEffect(() => {
            if (timeToOpen === null) return;
            if (timeToOpen > 0 && timeToOpen !== prevTimeToOpen.current) sound.tick();
            if (timeToOpen === 0 && prevTimeToOpen.current !== null && prevTimeToOpen.current > 0) sound.go();
            prevTimeToOpen.current = timeToOpen;
          }, [timeToOpen]);

          // ── 遊戲邏輯 ─────────────────────────────────────────

          const roomRef = () => db.collection('rooms_v2').doc(roomCode);
          const runRoomTransaction = (mutator) => {
            const ref = roomRef();
            return db.runTransaction(async (transaction) => {
              const snap = await transaction.get(ref);
              if (!snap.exists) throw new Error('房間不存在或已由房主關閉。');
              const data = snap.data();
              const result = mutator(data);
              if (result?.updates) transaction.update(ref, result.updates);
              return result || null;
            });
          };

          // 選院時先跳出說明 + 抽卡確認
          const handleGroupSelect = (t) => {
            if (t.joined) { showError('手腳太慢！此組別已被選走了。'); return; }
            const excCard = roomData.hands?.[t.id]?.[0] || null;
            const comCard = roomData.hands?.[t.id]?.[1] || null;
            setPendingGroup({ gid: t.id, team: t, excCard, comCard });
            setCardRevealed(false);
          };

          // 為每組建立初始手牌（1張院專屬 + 1張隨機共同卡）
          const buildInitialHands = () => {
            const yuanKeys = ['executive', 'legislative', 'judicial', 'examination', 'control'];
            const shuffledCommon = shuffle(COMMON_CARD_POOL);
            const hands = {};
            ['group1','group2','group3','group4','group5'].forEach((gid, i) => {
              const yuanKey = yuanKeys[i];
              const exclusiveBase = YUAN_EXCLUSIVE_CARDS[yuanKey];
              hands[gid] = [
                { ...exclusiveBase, uniqueId: `${gid}_exc`, isExclusive: true, usedOnQ: null },
                { ...shuffledCommon[i], uniqueId: `${gid}_com0`, isExclusive: false, usedOnQ: null },
              ];
            });
            return hands;
          };

          const createRoom = async () => {
            if (!user) { showError("尚未連線到伺服器，請稍候再試！"); return; }
            try {
              const code = Math.random().toString(36).substring(2, 6).toUpperCase();
              await db.collection('rooms_v2').doc(code).set({
                state: 'lobby', hostUid: user.uid,
                teams: {
                  group1: { id: 'group1', name: '第 1 組', joined: false, yuan: YUAN_DB[0] },
                  group2: { id: 'group2', name: '第 2 組', joined: false, yuan: YUAN_DB[1] },
                  group3: { id: 'group3', name: '第 3 組', joined: false, yuan: YUAN_DB[2] },
                  group4: { id: 'group4', name: '第 4 組', joined: false, yuan: YUAN_DB[3] },
                  group5: { id: 'group5', name: '第 5 組', joined: false, yuan: YUAN_DB[4] }
                },
                scores: { group1: 100, group2: 100, group3: 100, group4: 100, group5: 100 },
                hands: buildInitialHands(),
                lastRoundWinner: null,
                lastRoundPoints: 0,
                statusEffects: createStatusEffects(),
                questions: shuffle(QUESTION_BANK).slice(0, 12),
                qIndex: 0, buzzerWinner: null,
                buzzerOpenAt: 0, answerDeadline: null, wrongAnswerers: [],
                cardOverlay: null,
                // 突發事件：在 qIndex 3~7 結束後隨機觸發一次
                surpriseAfter: 3 + Math.floor(Math.random() * 8),  // qIndex 3..10 → 落在 Q4~Q12 之間
                surpriseTriggered: false,
                surpriseEvent: null,
                heartbeats: { host: Date.now(), group1: 0, group2: 0, group3: 0, group4: 0, group5: 0 },
                actionLog: ['🎯 遊戲房間已建立，等待各組加入...']
              });
              setRoomCode(code);
              setMyRole('host');
            } catch (e) { showError("建立房間失敗：" + e.message); }
          };

          const joinRoom = async () => {
            if (!user) { showError("連線中，請稍候！"); return; }
            if (!joinInput || joinInput.length !== 4) { showError("請輸入正確的 4 碼房間代碼！"); return; }
            try {
              const code = joinInput.toUpperCase();
              const snap = await db.collection('rooms_v2').doc(code).get();
              if (snap.exists) setRoomCode(code);
              else showError(`找不到代碼為「${code}」的房間！\n請確認老師大螢幕上的代碼。`);
            } catch (e) { showError("加入房間失敗：" + e.message); }
          };

          const selectGroup = async (gid) => {
            if (!roomData) return;
            if (roomData.teams[gid].joined) { showError("手腳太慢！此組別已被選走了。"); return; }
            try {
              await runRoomTransaction((data) => {
                if (data.state !== 'lobby') throw new Error('遊戲已開始，無法再選擇陣營。');
                if (!data.teams?.[gid]) throw new Error('找不到這個陣營。');
                if (data.teams[gid].joined) throw new Error('手腳太慢！此組別已被選走了。');
                return {
                  updates: {
                    [`teams.${gid}.joined`]: true,
                    [`teams.${gid}.uid`]: user.uid,
                    [`heartbeats.${gid}`]: Date.now(),
                  }
                };
              });
              setMyRole(gid);
            } catch (e) { showError("選擇組別時發生錯誤：" + e.message); }
          };

          const leaveRoom = () => { setRoomCode(''); setRoomData(null); setMyRole(null); };

          const startSync = async () => {
            try {
              await runRoomTransaction((data) => {
                if (data.state !== 'lobby') throw new Error('目前不能啟動遊戲。');
                return {
                  updates: {
                    state: 'countdown',
                    startTime: Date.now() + 5000,
                    actionLog: ['🎲 5秒後正式開始！', ...(data.actionLog || [])].slice(0, 5)
                  }
                };
              });
            } catch (e) {
              showError("啟動失敗：" + e.message);
            }
          };

          const handleBuzz = async () => {
            if (roomData.buzzerWinner) return;
            if ((roomData.scores[myRole] || 0) <= 0) return;
            if ((roomData.wrongAnswerers || []).includes(myRole)) return;
            try {
              await runRoomTransaction((data) => {
                const now = Date.now();
                if (data.state !== 'playing') throw new Error('目前不是搶答時間。');
                if (data.buzzerWinner) return null;
                if ((data.scores?.[myRole] || 0) <= 0) throw new Error('已淘汰，無法搶答。');
                if ((data.wrongAnswerers || []).includes(myRole)) throw new Error('本題已作答過。');
                const hasPriority = data.statusEffects?.[myRole]?.priorityBuzz;
                if (!hasPriority && now < data.buzzerOpenAt) throw new Error('搶答倒數尚未結束。');
                const newStatus = clonePlain(data.statusEffects || {});
                if (newStatus[myRole]) newStatus[myRole].priorityBuzz = false;
                return {
                  updates: {
                    buzzerWinner: myRole,
                    answerDeadline: now + ANSWER_TIME_LIMIT * 1000,
                    statusEffects: newStatus,
                  }
                };
              });
            } catch (e) {
              showError("搶答失敗：" + e.message);
            }
          };

          const handleAnswer = async (idx) => {
            if (!roomData || myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            try {
              const result = await runRoomTransaction((data) => {
                const now = Date.now();
                if (data.state !== 'playing') throw new Error('目前不是作答時間。');
                if (data.buzzerWinner !== myRole) throw new Error('本題已由其他組處理。');
                if (!data.answerDeadline) throw new Error('本題已結算。');
                const q = data.questions?.[data.qIndex];
                if (!q) throw new Error('找不到目前題目。');

                const isCorrect = idx === q.answer;
                if (isCorrect) {
                  const team = data.teams[myRole];
                  const isDouble = data.statusEffects?.[myRole]?.doublePoints;
                  const gained = isDouble ? CORRECT_POINTS * 2 : CORRECT_POINTS;
                  const pay = applyExamPayment(data, myRole, data.scores || {});
                  const payLog = pay.paid ? `（先繳 10 分給 ${pay.examYuan}）` : '';
                  const newScores = { ...pay.newScores, [myRole]: (pay.newScores[myRole] || 0) + gained };
                  const newStatus = clonePlain(data.statusEffects || {});
                  if (newStatus[myRole]) newStatus[myRole].doublePoints = false;
                  return {
                    shouldAdvance: true,
                    qIndex: data.qIndex,
                    isCorrect,
                    yuanName: team?.yuan?.name,
                    yuanText: team?.yuan?.text,
                    points: gained,
                    updates: {
                      scores: newScores,
                      statusEffects: newStatus,
                      answerDeadline: null,
                      lastRoundWinner: myRole,
                      lastRoundPoints: gained,
                      actionLog: [`✅ ${team?.yuan?.name} 答對！+${gained} 分${isDouble ? '（重大建設加倍！）' : ''}${payLog}`, ...(data.actionLog || [])].slice(0, 5)
                    }
                  };
                }

                const wrong = buildWrongAnswerUpdate(data, myRole, '答錯', now);
                const team = data.teams[myRole];
                return {
                  ...wrong,
                  qIndex: data.qIndex,
                  isCorrect,
                  yuanName: team?.yuan?.name,
                  yuanText: team?.yuan?.text,
                  points: -WRONG_PENALTY,
                };
              });

              if (!result) return;
              markLocalAnswer(idx, result.isCorrect, 'regular', result.yuanName, result.yuanText, result.points);
              if (result.shouldAdvance) setTimeout(() => nextQ(result.qIndex), 1500);
            } catch (e) {
              showError("送出答案失敗：" + e.message);
            }
          };

          const handleTimeout = () => {
            if (!roomData || myRole !== roomData.buzzerWinner || roomData.state !== 'playing') return;
            commitWrongAnswer('超時');
          };

          // 答錯/超時的共用邏輯
          const commitWrongAnswer = async (reason) => {
            try {
              const result = await runRoomTransaction((data) => {
                if (data.state !== 'playing') throw new Error('目前不是作答時間。');
                if (data.buzzerWinner !== myRole) throw new Error('本題已由其他組處理。');
                if (!data.answerDeadline) throw new Error('本題已結算。');
                return { ...buildWrongAnswerUpdate(data, myRole, reason, Date.now()), qIndex: data.qIndex };
              });
              if (result?.shouldAdvance) setTimeout(() => nextQ(result.qIndex), 1500);
            } catch (e) {
              showError(`${reason}結算失敗：` + e.message);
            }
          };

          // 發動技能卡
          const playCard = async (card, targetId = null) => {
            if (!roomData || !myRole || myRole === 'host') return;
            if (roomData.statusEffects?.[myRole]?.cardBanned) { showError('本回合被輿論炎上，無法發動技能卡！'); return; }
            // 同一題只能發動一張（usedOnQ === 本題 index）
            const myHand = roomData.hands?.[myRole] || [];
            if (myHand.some(c => c.usedOnQ === roomData.qIndex)) { showError('本回合只能發動一張技能卡！'); return; }

            const extraCommon = shuffle(COMMON_CARD_POOL)[0];
            const randomRoll = Math.random();
            const actionId = Date.now();
            try {
              const result = await runRoomTransaction((data) => {
                const now = Date.now();
                if (data.state !== 'playing') throw new Error('目前不是出牌時間。');
                if (data.buzzerWinner) throw new Error('已有人搶答，不能再出牌。');
                if (data.cardOverlay) throw new Error('目前正在結算其他技能。');
                if (now >= data.buzzerOpenAt) throw new Error('搶答已開放，不能再出牌。');
                if (data.statusEffects?.[myRole]?.cardBanned) throw new Error('本回合被輿論炎上，無法發動技能卡。');

                const freshHand = data.hands?.[myRole] || [];
                const activeCard = freshHand.find(c => c.uniqueId === card.uniqueId);
                if (!activeCard) throw new Error('找不到這張技能卡。');
                if (activeCard.usedOnQ !== null) throw new Error('這張技能卡已使用。');
                if (freshHand.some(c => c.usedOnQ === data.qIndex)) throw new Error('本回合只能發動一張技能卡。');

                const needsTarget = ['target','steal-exclusive','steal-common','card-ban','alliance'].includes(activeCard.type);
                if (needsTarget) {
                  if (!targetId || targetId === myRole) throw new Error('請選擇有效目標。');
                  if (!data.teams?.[targetId]?.joined) throw new Error('目標尚未加入遊戲。');
                  if ((data.scores?.[targetId] ?? 0) <= 0) throw new Error('目標已淘汰。');
                }

                const myYuan = data.teams[myRole]?.yuan?.name;
                const targetYuan = targetId ? data.teams[targetId]?.yuan?.name : null;
                let scores = { ...(data.scores || {}) };
                let statusEffects = clonePlain(data.statusEffects || {});
                let hands = clonePlain(data.hands || {});
                let log = `⚡ ${myYuan} 發動「${activeCard.name}」`;

                hands[myRole] = hands[myRole].map(c =>
                  c.uniqueId === activeCard.uniqueId ? { ...c, usedOnQ: data.qIndex } : c
                );

                switch (activeCard.type) {
                  case 'target':
                    if (statusEffects[targetId]?.shielded) {
                      statusEffects[targetId].shielded = false;
                      log += `，但 ${targetYuan} 護盾抵銷了傷害！`;
                    } else {
                      scores[targetId] = Math.max(0, (scores[targetId] || 0) - (activeCard.dmg || 50));
                      if (activeCard.id === 'con' && hands[targetId]) {
                        const ci = hands[targetId].findIndex(c => !c.isExclusive && c.usedOnQ === null);
                        if (ci !== -1) hands[targetId][ci].usedOnQ = -1;
                      }
                      log += `，鎖定 ${targetYuan}（-${activeCard.dmg || 50} 分）`;
                    }
                    break;
                  case 'self':
                    if (!statusEffects[myRole]) statusEffects[myRole] = {};
                    statusEffects[myRole].shielded = true;
                    Object.keys(statusEffects).forEach(gid => {
                      if (gid !== myRole) {
                        if (!statusEffects[gid]) statusEffects[gid] = {};
                        statusEffects[gid].mustPayExam = true;
                      }
                    });
                    log += `，本回合免疫扣分；其他院答題前須繳 10 分給 ${myYuan}`;
                    break;
                  case 'redistribute':
                    { const entries = Object.entries(scores).sort((a,b) => b[1]-a[1]);
                      const top = entries[0][0], bot = entries[entries.length-1][0];
                      if (top !== bot) { scores[top] = Math.max(0, scores[top]-20); scores[bot] += 20; }
                      log += `，${data.teams[top]?.yuan?.name} 轉移 20 分給 ${data.teams[bot]?.yuan?.name}`; }
                    break;
                  case 'all-bonus':
                    Object.keys(scores).forEach(k => { scores[k] = (scores[k]||0) + 10; });
                    hands[myRole].push({ ...extraCommon, uniqueId: `${myRole}_extra_${actionId}`, isExclusive: false, usedOnQ: null });
                    log += `，全場各 +10 分，本組再抽一張共同卡`;
                    break;
                  case 'double-points':
                    if (!statusEffects[myRole]) statusEffects[myRole] = {};
                    statusEffects[myRole].doublePoints = true;
                    log += `，本回合答對得 80 分`;
                    break;
                  case 'card-ban':
                    if (!statusEffects[targetId]) statusEffects[targetId] = {};
                    statusEffects[targetId].cardBanned = true;
                    log += `，${targetYuan} 下回合禁用技能卡`;
                    break;
                  case 'reactive':
                  case 'shield':
                    if (!statusEffects[myRole]) statusEffects[myRole] = {};
                    statusEffects[myRole].shielded = true;
                    log += `，已設置防禦護盾`;
                    break;
                  case 'priority-next':
                    if (!statusEffects[myRole]) statusEffects[myRole] = {};
                    statusEffects[myRole].priorityBuzz = true;
                    log += `，下一回合享優先搶答權`;
                    break;
                  case 'auto':
                    { const lw = data.lastRoundWinner, lp = data.lastRoundPoints || 0;
                      if (lw && lp > 0) {
                        scores[lw] = Math.max(0, (scores[lw]||0) - lp);
                        log += `，撤銷 ${data.teams[lw]?.yuan?.name} 上回合得分 (-${lp} 分)`;
                      } else { log += `，上回合無可撤銷的得分`; } }
                    break;
                  case 'steal-exclusive':
                    if (hands[targetId]) {
                      const ti = hands[targetId].findIndex(c => c.isExclusive && c.usedOnQ === null);
                      if (ti !== -1) {
                        const stolen = hands[targetId][ti];
                        hands[targetId][ti] = { ...stolen, usedOnQ: -1 };
                        hands[myRole].push({
                          ...stolen,
                          uniqueId: `${myRole}_stole_exc_${actionId}`,
                          usedOnQ: null,
                        });
                        log += `，奪走 ${targetYuan} 的【${stolen.name}】納為己用`;
                      } else {
                        log += `，${targetYuan} 已無院專屬技能可奪`;
                      }
                    }
                    break;
                  case 'rotate':
                    {
                      const oldScores = { ...scores };
                      GROUP_IDS.forEach((gid, i) => {
                        const nextGid = GROUP_IDS[(i + 1) % GROUP_IDS.length];
                        scores[gid] = oldScores[nextGid] ?? 0;
                      });
                      log += `，全場分數左移：第5→4、第4→3、第3→2、第2→1、第1→5`;
                    }
                    break;
                  case 'steal-common':
                    if (hands[targetId]) {
                      const candidates = [];
                      hands[targetId].forEach((c, idx) => {
                        if (!c.isExclusive && c.usedOnQ === null) candidates.push({ c, idx });
                      });
                      if (candidates.length > 0) {
                        const pick = candidates[Math.floor(randomRoll * candidates.length)];
                        const stolen = pick.c;
                        hands[targetId][pick.idx] = { ...stolen, usedOnQ: -1 };
                        hands[myRole].push({
                          ...stolen,
                          uniqueId: `${myRole}_stole_com_${actionId}`,
                          usedOnQ: null,
                        });
                        log += `，盲抽 ${targetYuan} 的【${stolen.name}】納為己用`;
                      } else {
                        log += `，${targetYuan} 無可偷的共同卡`;
                      }
                    }
                    break;
                  default:
                    log += `（效果開發中）`;
                }

                const remainingMs = Math.max(500, data.buzzerOpenAt - now);
                let targetDelta = null;
                if (targetId) {
                  const before = data.scores?.[targetId] ?? 0;
                  const after = scores[targetId] ?? 0;
                  if (before !== after) targetDelta = after - before;
                }

                return {
                  played: true,
                  updates: {
                    scores, hands, statusEffects,
                    buzzerOpenAt: now + 999999,
                    cardOverlay: {
                      playerGroup: myRole,
                      yuanName: myYuan,
                      cardName: activeCard.name,
                      cardDesc: activeCard.desc,
                      log,
                      targetGroup: targetId || null,
                      targetYuanName: targetYuan || null,
                      targetDelta,
                      remainingMs,
                      showUntil: now + 5000,
                    },
                    actionLog: [log, ...(data.actionLog || [])].slice(0, 5)
                  }
                };
              });

              if (result?.played) {
                sound.draw();
                sound.attack();
                setPendingCard(null);
              }
            } catch (e) {
              showError("發動技能失敗：" + e.message);
            }
          };

          const nextQ = async (expectedQIndex = roomData?.qIndex) => {
            if (typeof expectedQIndex !== 'number') expectedQIndex = roomData?.qIndex;
            if (!roomData || roomData.state !== 'playing' || typeof expectedQIndex !== 'number') return;
            const surpriseEvent = buildSurpriseEvent();
            try {
              await runRoomTransaction((data) => {
                if (data.state !== 'playing') return null;
                if (data.qIndex !== expectedQIndex) return null;
                return { updates: buildNextQuestionUpdate(data, Date.now(), surpriseEvent) };
              });
            } catch (e) {
              showError("切換題目失敗：" + e.message);
            }
          };

          // 學生在突發事件中作答（每人只可選一次；結算前只顯示已選，不顯示正解）
          const answerSurprise = async (idx) => {
            if (myRole === 'host' || !roomData?.surpriseEvent) return;
            if (roomData.surpriseEvent.answers?.[myRole] !== undefined) return;
            try {
              const result = await runRoomTransaction((data) => {
                const ev = data.surpriseEvent;
                if (data.state !== 'surprise' || !ev) throw new Error('目前不是突發事件作答時間。');
                if (ev.resolved) throw new Error('突發事件已結算。');
                if (Date.now() > ev.deadline) throw new Error('作答時間已結束。');
                if (ev.answers?.[myRole] !== undefined) return null;
                return {
                  accepted: true,
                  idx,
                  updates: { [`surpriseEvent.answers.${myRole}`]: idx }
                };
              });
              if (result?.accepted) {
                if (localAnswerTimer.current) { clearTimeout(localAnswerTimer.current); localAnswerTimer.current = null; }
                setLocalAnswerResult({ idx: result.idx, isCorrect: null, scope: 'surprise' });
              }
            } catch (e) {
              showError("突發事件作答失敗：" + e.message);
            }
          };

          // 結算突發事件：先寫入 resolved + results 讓所有人看到通知，3.5 秒後再進下一題
          const resolveSurpriseEvent = async () => {
            if (!roomData?.surpriseEvent || myRole !== 'host') return;
            if (roomData.surpriseEvent.resolved || surpriseResolving.current) return;
            surpriseResolving.current = true;
            try {
              await runRoomTransaction((data) => {
                const ev = data.surpriseEvent;
                if (data.state !== 'surprise' || !ev || ev.resolved) return null;
                const newScores = { ...(data.scores || {}) };
                const results = [];
                const correctNames = [], wrongNames = [];
                joinedGroupIds(data.teams).forEach(gid => {
                  const idx = ev.answers?.[gid];
                  const team = data.teams[gid];
                  if (idx === undefined) {
                    results.push({ yuanId:gid, yuan:team?.yuan?.name, yuanText:team?.yuan?.text, resultType:'skipped', points:0 });
                  } else if (idx === ev.answer) {
                    newScores[gid] = (newScores[gid] || 0) + SURPRISE_POINTS;
                    results.push({ yuanId:gid, yuan:team?.yuan?.name, yuanText:team?.yuan?.text, resultType:'correct', points:SURPRISE_POINTS });
                    correctNames.push(team?.yuan?.name);
                  } else {
                    newScores[gid] = Math.max(0, (newScores[gid] || 0) - WRONG_PENALTY);
                    results.push({ yuanId:gid, yuan:team?.yuan?.name, yuanText:team?.yuan?.text, resultType:'wrong', points:-WRONG_PENALTY });
                    wrongNames.push(team?.yuan?.name);
                  }
                });
                const resolvedAt = Date.now();
                return {
                  updates: {
                    scores: newScores,
                    surpriseEvent: { ...ev, resolved: true, results, resolvedAt },
                    actionLog: [
                      `🎯 突發事件結算：答對 +${SURPRISE_POINTS}${correctNames.length ? ` (${correctNames.join('、')})` : ''}${wrongNames.length ? ` / 答錯 -${WRONG_PENALTY} (${wrongNames.join('、')})` : ''}`,
                      ...(data.actionLog || [])
                    ].slice(0, 5),
                  }
                };
              });
              setTimeout(() => { surpriseResolving.current = false; }, 1000);
            } catch (e) {
              surpriseResolving.current = false;
              showError("突發事件結算失敗：" + e.message);
            }
          };

          // 結算完 3.5 秒後推進到下一題（host 觸發、用 captured 值避免 stale state）
          const advancePastSurprise = async () => {
            if (!roomData || myRole !== 'host') return;
            const ev = roomData.surpriseEvent;
            if (!ev?.resolved) return;
            const expectedResolvedAt = ev.resolvedAt;
            try {
              await runRoomTransaction((data) => {
                const freshEv = data.surpriseEvent;
                if (data.state !== 'surprise' || !freshEv?.resolved) return null;
                if (expectedResolvedAt && freshEv.resolvedAt !== expectedResolvedAt) return null;
                const nextIdx = data.qIndex + 1;
                const hasMore = nextIdx < (data.questions || []).length;
                return {
                  updates: {
                    state: hasMore ? 'playing' : 'end',
                    qIndex: hasMore ? nextIdx : data.qIndex,
                    buzzerOpenAt: hasMore ? Date.now() + BUZZ_DELAY_NEW_Q * 1000 : 0,
                    buzzerWinner: null,

                    wrongAnswerers: [],
